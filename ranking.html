<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>排行榜</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0b0e1a;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e8f0;padding:16px}
        .container{max-width:550px;width:100%}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .title{font-size:30px;font-weight:700;background:linear-gradient(135deg,#fbbf24,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
        .btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#b0c4e0;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;letter-spacing:.5px;transition:.2s;display:inline-block}
        .btn:hover{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.3);color:#fbbf24}

        .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
        .tab{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#8896b0;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap}
        .tab:hover{color:#c0d0e8;border-color:rgba(255,255,255,.15)}
        .tab.active{background:rgba(251,191,36,.12);border-color:#fbbf24;color:#fbbf24}

        .rank-table{width:100%;border-collapse:collapse}
        .rank-table th{text-align:left;font-size:11px;color:#5a6a85;text-transform:uppercase;letter-spacing:1.5px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.06)}
        .rank-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,.03);font-size:14px}
        .rank-num{width:30px;text-align:center;font-weight:700;font-size:16px}
        .rank-1{color:#fbbf24}.rank-2{color:#94a3b8}.rank-3{color:#fb923c}
        .medal{font-size:22px}
        .player-name{color:#c0d8f0;font-weight:500}
        .score-val{color:#fbbf24;font-weight:700;font-size:16px;text-align:right}
        .game-tag{font-size:11px;padding:2px 10px;border-radius:10px;background:rgba(255,255,255,.04);color:#8896b0;white-space:nowrap}
        .time-col{font-size:11px;color:#5a6a85;text-align:right}
        .extra{font-size:11px;color:#5a6a85}

        .loading{text-align:center;padding:40px;color:#5a6a85}
        .empty{text-align:center;padding:40px;color:#5a6a85}
        .refresh{font-size:12px;color:#5a6a85;text-align:center;margin-top:16px}

        @media(max-width:400px){.title{font-size:24px}.rank-table td{font-size:12px;padding:8px 6px}.tab{font-size:11px;padding:6px 12px}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🏆 排行榜</div>
        <a class="btn" href="index.html">← 返回</a>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" data-game="all">🏅 总榜</div>
        <div class="tab" data-game="2048">🎮 2048</div>
        <div class="tab" data-game="snake">🐍 贪吃蛇</div>
        <div class="tab" data-game="tetris">🧱 俄罗斯方块</div>
        <div class="tab" data-game="minesweeper">💣 扫雷</div>
        <div class="tab" data-game="memory">🧠 记忆翻牌</div>
        <div class="tab" data-game="breakout">🏓 打砖块</div>
        <div class="tab" data-game="shooter">🛸 飞机大战</div>
        <div class="tab" data-game="gomoku">⚫ 五子棋</div>
        <div class="tab" data-game="sudoku">🔢 数独</div>
    </div>

    <div id="content"><div class="loading">加载中...</div></div>
    <div class="refresh" id="refresh"></div>
</div>

<script src="leaderboard.js"></script>
<script>
(async function(){
    const content = document.getElementById('content');
    const refreshEl = document.getElementById('refresh');
    let currentGame = 'all';

    function renderScores(scores, game) {
        if (!scores.length) return '<div class="empty">暂无数据，去游戏中提交分数吧！</div>';
        let html = '<table class="rank-table"><tr><th>#</th><th>玩家</th><th>游戏</th><th>分数</th><th style="text-align:right">时间</th></tr>';
        scores.forEach((s, i) => {
            const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
            const gameName = { '2048':'🎮2048', snake:'🐍贪吃蛇', tetris:'🧱俄罗斯方块', minesweeper:'💣扫雷', memory:'🧠记忆翻牌', breakout:'🏓打砖块', shooter:'🛸飞机大战', gomoku:'⚫五子棋', sudoku:'🔢数独' }[s.game] || s.game;
            html += `<tr>
                <td class="rank-num ${rankClass}">${medal || (i + 1)}</td>
                <td class="player-name">${esc(s.player || '匿名')}</td>
                <td><span class="game-tag">${gameName}</span></td>
                <td class="score-val">${s.score}</td>
                <td class="time-col">${s.time||''}</td>
            </tr>`;
            if (s.extra) html += `<tr><td></td><td colspan="4" class="extra">${s.extra}</td></tr>`;
        });
        html += '</table>';
        return html;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function load() {
        content.innerHTML = '<div class="loading">加载中...</div>';
        try {
            let scores;
            if (currentGame === 'all') {
                scores = await LEADERBOARD.getAllRanked(30);
            } else {
                scores = await LEADERBOARD.getTop(currentGame, 20);
            }
            content.innerHTML = renderScores(scores, currentGame);
        } catch(e) {
            content.innerHTML = '<div class="empty">加载失败，请重试</div>';
        }
        refreshEl.textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN') + ' · 点击标签刷新';
    }

    document.getElementById('tabs').addEventListener('click', e => {
        if (e.target.classList.contains('tab')) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            currentGame = e.target.dataset.game;
            load();
        }
    });

    load();
    setInterval(load, 30000); // 每30秒自动刷新
})();
</script>
</body>
</html>
