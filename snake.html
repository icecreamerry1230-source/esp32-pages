<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #e0e8f0;
            padding: 16px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .container { max-width: 480px; width: 100%; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .title {
            font-size: 38px; font-weight: 700;
            background: linear-gradient(135deg, #4ade80, #22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 2px;
        }

        .scores { display: flex; gap: 10px; }
        .score-box {
            background: rgba(18,26,42,0.9); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 8px 16px; text-align: center; min-width: 70px;
        }
        .score-label { font-size: 11px; color: #8896b0; text-transform: uppercase; letter-spacing: 1.5px; }
        .score-value { font-size: 22px; font-weight: 600; color: #f0f4ff; }
        .score-value.best { color: #4ade80; }

        .toolbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; gap: 12px;
        }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #b0c4e0; padding: 10px 22px; border-radius: 30px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            letter-spacing: 0.5px; transition: 0.2s; white-space: nowrap;
        }
        .btn:hover { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; }
        .btn.primary { background: rgba(74,222,128,0.12); border-color: #4ade80; color: #4ade80; }
        .btn.primary:hover { background: rgba(74,222,128,0.25); }
        .hint { font-size: 12px; color: #5a6a85; letter-spacing: 0.5px; }

        .game-wrapper {
            position: relative;
            background: rgba(18,26,42,0.8); border-radius: 20px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.3);
        }

        canvas {
            display: block; width: 100%;
            border-radius: 12px;
            background: #0b0f1a;
        }

        .overlay {
            position: absolute; inset: 0;
            background: rgba(11,14,26,0.85); border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            z-index: 10;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.show { opacity: 1; pointer-events: all; }
        .overlay .msg { font-size: 32px; font-weight: 700; letter-spacing: 2px; color: #f87171; }
        .overlay .sub { font-size: 14px; color: #8896b0; }

        .dpad {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px 70px;
            gap: 6px;
            justify-content: center;
            margin-top: 16px;
        }
        .dpad button {
            width: 70px; height: 70px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: #b0c4e0;
            font-size: 24px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .dpad button:active { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; }
        .dpad .empty { border: none; background: none; pointer-events: none; }

        @media (max-width: 400px) {
            .title { font-size: 28px; }
            .dpad { grid-template-columns: 55px 55px 55px; grid-template-rows: 55px 55px 55px; gap: 4px; }
            .dpad button { width: 55px; height: 55px; font-size: 20px; border-radius: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">🐍 贪吃蛇</div>
        <div class="scores">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高</div>
                <div class="score-value best" id="best">0</div>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn primary" id="restartBtn">⟳ 重新开始</button>
        <div class="control-item">
            <label>难度</label>
            <select id="diffSelect" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#b0c4e0;padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;">
                <option value="1">1 · 入门</option>
                <option value="2">2 · 简单</option>
                <option value="3">3 · 普通</option>
                <option value="4" selected>4 · 中等</option>
                <option value="5">5 · 进阶</option>
                <option value="6">6 · 困难</option>
                <option value="7">7 · 极难</option>
                <option value="8">8 · 噩梦</option>
                <option value="9">9 · 地狱</option>
                <option value="10">10 · 不可能</option>
            </select>
        </div>
    </div>

    <div class="game-wrapper" id="gameWrapper">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
            <div class="msg" id="overlayMsg">游戏结束</div>
            <div class="sub" id="overlaySub"></div>
            <button class="btn primary" id="overlayBtn">⟳ 再来一局</button>
        </div>
    </div>

    <!-- 手机方向键 -->
    <div class="dpad">
        <div class="empty"></div>
        <button id="btnUp">▲</button>
        <div class="empty"></div>
        <button id="btnLeft">◀</button>
        <button id="btnPause" style="font-size:14px">⏯</button>
        <button id="btnRight">▶</button>
        <div class="empty"></div>
        <button id="btnDown">▼</button>
        <div class="empty"></div>
    </div>
</div>

<script src="leaderboard.js"></script>
<script src="game-sdk.js"></script>
<script>
(function() {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    const overlaySub = document.getElementById('overlaySub');
    const gameWrapper = document.getElementById('gameWrapper');

    const CELL = 20;
    const COLS = 20;
    const ROWS = 20;
    // 难度 1→200ms, 5→120ms, 10→60ms
    function speedForDiff(d) { return Math.round(220 - (d - 1) * 18); }

    let snake, food, direction, nextDirection, score, bestScore, gameOver, paused, gameLoop, speed, difficulty;

    // ===== localStorage =====
    function loadBest() { try { return parseInt(localStorage.getItem('snake_best')) || 0; } catch { return 0; } }
    function saveBest(v) { try { localStorage.setItem('snake_best', v); } catch {} }

    // ===== 初始化 =====
    function init() {
        difficulty = parseInt(document.getElementById('diffSelect').value);
        const mid = Math.floor(COLS / 2);
        snake = [
            { x: mid, y: Math.floor(ROWS / 2) },
            { x: mid - 1, y: Math.floor(ROWS / 2) },
            { x: mid - 2, y: Math.floor(ROWS / 2) },
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        gameOver = false;
        paused = false;
        speed = speedForDiff(difficulty);
        placeFood();
        updateScore();
        hideOverlay();
        resizeCanvas();
        if (gameLoop) clearTimeout(gameLoop);
        tick();
    }

    function placeFood() {
        const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
        const free = [];
        for (let x = 0; x < COLS; x++)
            for (let y = 0; y < ROWS; y++)
                if (!occupied.has(`${x},${y}`)) free.push({ x, y });
        if (free.length) food = free[Math.floor(Math.random() * free.length)];
    }

    function resizeCanvas() {
        const rect = gameWrapper.getBoundingClientRect();
        const size = Math.floor(rect.width - 20);
        canvas.width = COLS * CELL;
        canvas.height = ROWS * CELL;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
    }

    // ===== 逻辑 =====
    function tick() {
        if (gameOver) return;
        if (!paused) {
            direction = { ...nextDirection };
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 碰墙
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }
            // 碰自己
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (food && head.x === food.x && head.y === food.y) {
                score += 10;
                placeFood();
                updateScore();
                const base = speedForDiff(difficulty);
                speed = Math.max(30, base - Math.floor(score / 50) * 3);
            } else {
                snake.pop();
            }
        }

        draw();
        gameLoop = setTimeout(tick, speed);
    }

    function endGame() {
        gameOver = true;
        pauseGame();
        if (score > bestScore) {
            bestScore = score;
            saveBest(bestScore);
        }
        updateScore();
        submitGameScore('snake', score, '难度'+difficulty);
        submitGameScore('snake', score, '难度'+difficulty);
        overlayMsg.textContent = '游戏结束';
        overlaySub.textContent = `得分: ${score}`;
        overlay.classList.add('show');
    }

    function pauseGame() {
        paused = !paused;
        document.getElementById('btnPause').textContent = paused ? '▶' : '⏯';
    }

    function setDirection(dx, dy) {
        if (gameOver || paused) return;
        // 不能反向
        if (dx === -direction.x && dy === -direction.y && snake.length > 1) return;
        // 不能原地不动
        if (dx === 0 && dy === 0) return;
        nextDirection = { x: dx, y: dy };
    }

    // ===== 渲染 =====
    function draw() {
        const W = COLS * CELL, H = ROWS * CELL;
        ctx.clearRect(0, 0, W, H);

        // 网格
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke(); }
        for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke(); }

        // 食物
        if (food) {
            const fx = food.x * CELL + CELL / 2;
            const fy = food.y * CELL + CELL / 2;
            ctx.beginPath();
            ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
            ctx.fillStyle = '#f87171';
            ctx.shadowColor = '#f87171';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 蛇
        snake.forEach((s, i) => {
            const x = s.x * CELL + 1, y = s.y * CELL + 1, w = CELL - 2;
            const t = i / Math.max(snake.length - 1, 1);
            const r = Math.floor(74 + t * 180);
            const g = Math.floor(222 - t * 80);
            const b = Math.floor(128 - t * 60);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            const radius = i === 0 ? 6 : 4;
            roundRect(x, y, w, w, radius);
            ctx.shadowColor = `rgb(${r},${g},${b})`;
            ctx.shadowBlur = i === 0 ? 12 : 4;
            ctx.fill();
            ctx.shadowBlur = 0;

            if (i === 0) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                const ex = s.x * CELL + CELL / 2 + direction.x * 4;
                const ey = s.y * CELL + CELL / 2 + direction.y * 4;
                ctx.arc(ex - 3, ey - 3, 3, 0, Math.PI * 2);
                ctx.arc(ex + 3, ey - 3, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    // ===== 分数 & 蒙层 =====
    function updateScore() {
        scoreEl.textContent = score;
        if (score > bestScore) { bestScore = score; saveBest(bestScore); }
        bestEl.textContent = bestScore;
    }
    function hideOverlay() { overlay.classList.remove('show'); }

    // ===== 事件 =====
    document.addEventListener('keydown', e => {
        const map = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
        const d = map[e.key];
        if (d) { e.preventDefault(); setDirection(d[0], d[1]); }
        if (e.key === ' ' || e.key === 'p') { e.preventDefault(); pauseGame(); }
    });

    // 触屏滑动
    let tx = 0, ty = 0;
    gameWrapper.addEventListener('touchstart', e => {
        if (e.touches.length === 1) { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }
    }, { passive: true });
    gameWrapper.addEventListener('touchend', e => {
        const dx = (e.changedTouches[0]?.clientX || 0) - tx;
        const dy = (e.changedTouches[0]?.clientY || 0) - ty;
        const min = 20;
        if (Math.abs(dx) < min && Math.abs(dy) < min) return;
        if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
        else setDirection(0, dy > 0 ? 1 : -1);
    });

    // 按钮
    document.getElementById('btnUp').addEventListener('click', () => setDirection(0, -1));
    document.getElementById('btnDown').addEventListener('click', () => setDirection(0, 1));
    document.getElementById('btnLeft').addEventListener('click', () => setDirection(-1, 0));
    document.getElementById('btnRight').addEventListener('click', () => setDirection(1, 0));
    document.getElementById('btnPause').addEventListener('click', pauseGame);
    document.getElementById('restartBtn').addEventListener('click', init);
    document.getElementById('overlayBtn').addEventListener('click', init);

    window.addEventListener('resize', resizeCanvas);

    // ===== 启动 =====
    bestScore = loadBest();
    bestEl.textContent = bestScore;
    init();
})();
</script>

</body>
</html>
