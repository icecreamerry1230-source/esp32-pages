<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>打砖块</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0b0e1a;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e8f0;padding:16px;touch-action:none;user-select:none;-webkit-user-select:none}
        .container{max-width:500px;width:100%}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .title{font-size:32px;font-weight:700;background:linear-gradient(135deg,#f87171,#fb923c,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
        .stats{display:flex;gap:8px}
        .stat-box{background:rgba(18,26,42,.9);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:6px 14px;text-align:center;min-width:55px}
        .stat-label{font-size:10px;color:#8896b0;letter-spacing:1px}
        .stat-value{font-size:20px;font-weight:600;color:#f0f4ff}
        .stat-value.best{color:#f87171}
        .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
        .btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#b0c4e0;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.5px;transition:.2s}
        .btn:hover{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:#f87171}
        .btn.primary{background:rgba(248,113,113,.12);border-color:#f87171;color:#f87171}
        .btn.primary:hover{background:rgba(248,113,113,.25)}
        .game-wrapper{background:rgba(18,26,42,.8);border-radius:16px;padding:10px;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 0 60px rgba(0,0,0,.3);position:relative}
        canvas{display:block;width:100%;border-radius:8px;background:#0b0f1a}
        .overlay{position:absolute;inset:0;background:rgba(11,14,26,.88);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s}
        .overlay.show{opacity:1;pointer-events:all}
        .overlay .msg{font-size:32px;font-weight:700;letter-spacing:2px}
        .overlay .msg.win{color:#fbbf24}.overlay .msg.lose{color:#f87171}
        .overlay .sub{font-size:14px;color:#8896b0}
        .hint{font-size:11px;color:#5a6a85}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🏓 打砖块</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
            <div class="stat-box"><div class="stat-label">🏆</div><div class="stat-value best" id="best">0</div></div>
            <div class="stat-box"><div class="stat-label">❤️</div><div class="stat-value" id="lives" style="color:#f87171">3</div></div>
        </div>
    </div>
    <div class="toolbar">
        <button class="btn primary" id="restartBtn">⟳ 新游戏</button>
        <span class="hint">鼠标/手指移动 ←→</span>
    </div>
    <div class="game-wrapper" id="gameWrapper">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
            <div class="msg" id="overlayMsg"></div>
            <div class="sub" id="overlaySub"></div>
            <button class="btn primary" id="overlayBtn">⟳ 再来一局</button>
        </div>
    </div>
</div>
<script>
(function(){
    const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
    const livesEl=document.getElementById('lives'),gameWrapper=document.getElementById('gameWrapper');
    const overlay=document.getElementById('overlay'),overlayMsg=document.getElementById('overlayMsg');
    const overlaySub=document.getElementById('overlaySub');

    const ROWS=6,COLS=8;
    let paddle,bricks,ball,score,bestScore,lives,gameOver,gameLoop;
    let paddleX;

    function loadBest(){try{return parseInt(localStorage.getItem('breakout_best'))||0}catch{return 0}}
    function saveBest(v){try{localStorage.setItem('breakout_best',v)}catch{}}

    function init(){
        score=0;lives=3;gameOver=false;bestScore=loadBest();
        scoreEl.textContent='0';bestEl.textContent=bestScore;livesEl.textContent='3';
        overlay.classList.remove('show');
        resizeCanvas();
        initBricks();
        initBall();
        paddle={w:80,h:12};
        if(gameLoop)cancelAnimationFrame(gameLoop);
        loop();
    }

    function initBricks(){
        bricks=[];const colors=['#f87171','#fb923c','#fbbf24','#4ade80','#60a5fa','#a78bfa'];
        for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)bricks.push({x:c*(canvas.width/COLS)+2,y:r*22+40,w:canvas.width/COLS-4,h:18,alive:true,color:colors[r]});
    }

    function initBall(){
        ball={x:canvas.width/2,y:canvas.height-40,r:7,dx:(Math.random()-.5)*4,dy:-4};
        if(Math.abs(ball.dx)<1.5)ball.dx=ball.dx>0?2.5:-2.5;
        paddleX=canvas.width/2-paddle.w/2;
    }

    function resizeCanvas(){
        const w=gameWrapper.clientWidth-20;
        canvas.width=Math.min(w,500);
        canvas.height=canvas.width*1.3;
        if(paddle)paddle.w=canvas.width/6.25;
        if(bricks&&bricks.length)initBricks();
        if(paddle)paddleX=Math.min(paddleX,canvas.width-paddle.w);
    }

    function loop(){
        if(gameOver)return;
        update();draw();
        gameLoop=requestAnimationFrame(loop);
    }

    function update(){
        ball.x+=ball.dx;ball.y+=ball.dy;
        if(ball.x-ball.r<=0||ball.x+ball.r>=canvas.width)ball.dx*=-1;
        if(ball.y-ball.r<=0)ball.dy*=-1;
        if(ball.y+ball.r>=canvas.height-2){if(lives>1){lives--;livesEl.textContent=lives;initBall()}else{livesEl.textContent='0';endGame(false)}}

        // 挡板碰撞
        if(ball.y+ball.r>=canvas.height-paddle.h-16&&ball.y-ball.r<=canvas.height-16&&ball.x>=paddleX&&ball.x<=paddleX+paddle.w){
            const hit=(ball.x-paddleX)/paddle.w;
            ball.dy=-Math.abs(ball.dy);
            ball.dx=(hit-.5)*7;
            ball.y=canvas.height-paddle.h-16-ball.r;
        }

        // 砖块碰撞
        for(const b of bricks){
            if(!b.alive)continue;
            if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
                b.alive=false;score+=10;ball.dy*=-1;
                scoreEl.textContent=score;
                break;
            }
        }
        if(bricks.every(b=>!b.alive))endGame(true);
        paddleX=Math.max(0,Math.min(canvas.width-paddle.w,paddleX));
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // 砖块
        for(const b of bricks)if(b.alive){ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h)}
        // 挡板
        ctx.fillStyle='#e0e8f0';ctx.beginPath();
        roundRect(ctx,paddleX,canvas.height-16,paddle.w,paddle.h,6);ctx.fill();
        // 球
        ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
    }

    function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}

    function endGame(won){
        gameOver=true;cancelAnimationFrame(gameLoop);
        if(score>bestScore){bestScore=score;saveBest(bestScore);bestEl.textContent=bestScore}
        overlayMsg.className='msg '+(won?'win':'lose');
        overlayMsg.textContent=won?'🎉 通关！':'💥 失败';
        overlaySub.textContent=`得分: ${score}`;
        overlay.classList.add('show');
    }

    canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();paddleX=(e.clientX-r.left)*(canvas.width/r.width)-paddle.w/2});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();paddleX=(e.touches[0].clientX-r.left)*(canvas.width/r.width)-paddle.w/2},{passive:false});
    document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')paddleX-=25;if(e.key==='ArrowRight')paddleX+=25});
    document.getElementById('restartBtn').addEventListener('click',init);
    document.getElementById('overlayBtn').addEventListener('click',init);
    window.addEventListener('resize',resizeCanvas);
    init();
})();
</script>
</body>
</html>
