<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>电子木鱼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0e1a;font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;color:#e0e8f0;padding:20px;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  overflow:hidden;
}
.container{text-align:center;max-width:400px;width:100%}
.back{color:#6a7a95;text-decoration:none;font-size:13px;letter-spacing:1px;display:inline-block;margin-bottom:24px;transition:color .2s}
.back:hover{color:#a78bfa}

/* 计数显示 */
.counter-section{margin-bottom:20px}
.merit-label{font-size:13px;color:#5a6a85;letter-spacing:2px;margin-bottom:4px}
.merit-count{font-size:56px;font-weight:300;color:#fbbf24;line-height:1.1}
.merit-today{font-size:13px;color:#4a5a75;margin-top:4px}

/* 木鱼 */
.muyu-wrapper{
  position:relative;width:220px;height:220px;margin:20px auto;
  display:flex;align-items:center;justify-content:center;
}
.muyu-body{
  width:180px;height:140px;border-radius:45% 45% 50% 50%;
  background:radial-gradient(ellipse at 50% 30%,#8B6914,#6B4F12 40%,#4a3510 70%,#3a2a0c);
  position:relative;cursor:pointer;
  box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 -4px 8px rgba(0,0,0,.3);
  transition:transform .06s;
  -webkit-tap-highlight-color:transparent;
}
.muyu-body:active{transform:scale(.93)}
.muyu-body.hit{animation:muyuHit .15s ease}
@keyframes muyuHit{
  0%{transform:scale(1)}
  30%{transform:scale(.9)}
  100%{transform:scale(1)}
}
/* 木鱼纹理 */
.muyu-body::before{
  content:'';position:absolute;inset:8px;border-radius:inherit;
  background:radial-gradient(ellipse at 50% 25%,rgba(255,255,255,.05),transparent 60%);
  pointer-events:none;
}
/* 开口缝 */
.muyu-slit{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:50px;height:3px;background:rgba(0,0,0,.4);
  border-radius:2px;pointer-events:none;
}
.muyu-slit::after{
  content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  width:3px;height:12px;background:rgba(0,0,0,.35);border-radius:2px;
}

/* 木槌 */
.mallet{
  position:absolute;top:10px;right:-20px;
  width:12px;height:70px;
  background:linear-gradient(to right,#5a3a0a,#8B6914,#5a3a0a);
  border-radius:6px 6px 3px 3px;
  transform:rotate(25deg);
  transform-origin:bottom center;
  transition:transform .08s;
  box-shadow:2px 2px 4px rgba(0,0,0,.4);
}
.mallet.hit{transform:rotate(8deg)}
.mallet::after{
  content:'';position:absolute;bottom:-14px;left:-8px;
  width:28px;height:20px;border-radius:50% 50% 30% 30%;
  background:radial-gradient(circle at 40% 40%,#a07830,#6B4F12);
  box-shadow:2px 2px 4px rgba(0,0,0,.3);
}

/* 涟漪 */
.ripple{
  position:absolute;border:1px solid rgba(251,191,36,.3);
  border-radius:50%;pointer-events:none;
  animation:rippleOut .6s ease-out forwards;
}
@keyframes rippleOut{
  0%{width:20px;height:20px;opacity:1}
  100%{width:200px;height:200px;opacity:0}
}

/* 文字弹出 */
.float-text{
  position:absolute;color:#fbbf24;font-size:18px;font-weight:600;
  pointer-events:none;animation:floatUp 1s ease-out forwards;
  white-space:nowrap;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

/* 底部按钮 */
.actions{margin-top:28px;display:flex;justify-content:center;gap:12px}
.actions button{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#6a7a95;padding:8px 18px;border-radius:16px;font-size:13px;
  cursor:pointer;transition:all .15s;
}
.actions button:active{background:rgba(255,255,255,.1)}
.actions .btn-auto{
  background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.15);color:#fbbf24;
}
.actions .btn-auto.active{
  background:rgba(251,191,36,.18);border-color:rgba(251,191,36,.35);
}
</style>
</head>
<body>
<div class="container">
  <a class="back" href="tools.html">← 工具</a>

  <div class="counter-section">
    <div class="merit-label">功 德</div>
    <div class="merit-count" id="counter">0</div>
    <div class="merit-today">今日: <span id="today-counter">0</span></div>
  </div>

  <div class="muyu-wrapper" id="muyu-wrapper">
    <div class="muyu-body" id="muyu">
      <div class="muyu-slit"></div>
    </div>
    <div class="mallet" id="mallet"></div>
  </div>

  <div class="actions">
    <button class="btn-auto" id="btn-auto">⏯ 自动敲击</button>
    <button id="btn-reset">↺ 归零</button>
  </div>
</div>

<script>
// ══════════════════════════════ 音频引擎 ══════════════════════════════
let audioCtx=null;

function initAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}

function playKnock(){
  if(!audioCtx) return;
  const t=audioCtx.currentTime;

  // 木鱼声：短促的中频敲击 + 低频共鸣
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();

  // 带通滤波，模拟木鱼腔体共鸣
  filter.type='bandpass';
  filter.frequency.setValueAtTime(800,t);
  filter.frequency.exponentialRampToValueAtTime(120,t+.08);
  filter.Q.setValueAtTime(3,t);

  osc.type='sine';
  osc.frequency.setValueAtTime(600,t);
  osc.frequency.exponentialRampToValueAtTime(200,t+.06);

  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(0.6,t+.003);
  gain.gain.exponentialRampToValueAtTime(0.001,t+.12);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t+.15);

  // 叠加低频木质共振
  const osc2=audioCtx.createOscillator();
  const gain2=audioCtx.createGain();
  osc2.type='triangle';
  osc2.frequency.setValueAtTime(180,t);
  osc2.frequency.exponentialRampToValueAtTime(60,t+.1);
  gain2.gain.setValueAtTime(0,t);
  gain2.gain.linearRampToValueAtTime(0.3,t+.005);
  gain2.gain.exponentialRampToValueAtTime(0.001,t+.2);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(t);
  osc2.stop(t+.22);
}

// ══════════════════════════════ 状态 ══════════════════════════════
const TODAY_KEY='muyu_today';
const TOTAL_KEY='muyu_total';

function getToday(){return parseInt(localStorage.getItem(TODAY_KEY)||'0')}
function setToday(v){localStorage.setItem(TODAY_KEY,v)}
function getTotal(){return parseInt(localStorage.getItem(TOTAL_KEY)||'0')}
function setTotal(v){localStorage.setItem(TOTAL_KEY,v)}
function isNewDay(){
  const last=localStorage.getItem('muyu_date');
  const today=new Date().toDateString();
  return last!==today;
}

let todayCount=getToday();
let totalCount=getTotal();
if(isNewDay()){todayCount=0;setToday(0);localStorage.setItem('muyu_date',new Date().toDateString())}

// ══════════════════════════════ 交互 ══════════════════════════════
const muyu=document.getElementById('muyu');
const mallet=document.getElementById('mallet');
const wrapper=document.getElementById('muyu-wrapper');

function knock(){
  initAudio();
  playKnock();

  todayCount++;totalCount++;
  setToday(todayCount);setTotal(totalCount);

  // 动画
  muyu.classList.remove('hit');
  void muyu.offsetWidth;
  muyu.classList.add('hit');
  mallet.classList.remove('hit');
  void mallet.offsetWidth;
  mallet.classList.add('hit');

  // 涟漪
  const ripple=document.createElement('div');
  ripple.className='ripple';
  ripple.style.left='50%';ripple.style.top='50%';
  ripple.style.transform='translate(-50%,-50%)';
  wrapper.appendChild(ripple);
  setTimeout(()=>ripple.remove(),700);

  // 浮动文字
  const ft=document.createElement('div');
  ft.className='float-text';
  ft.textContent='功德 +1';
  ft.style.left=(40+Math.random()*40)+'%';
  ft.style.top='30%';
  wrapper.appendChild(ft);
  setTimeout(()=>ft.remove(),1100);

  updateUI();
}

function updateUI(){
  document.getElementById('counter').textContent=totalCount;
  document.getElementById('today-counter').textContent=todayCount;
}

muyu.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  knock();
});

// 防止双击缩放
muyu.addEventListener('dblclick',(e)=>e.preventDefault());

// ══════════════════════════════ 自动敲击 ══════════════════════════════
let autoInterval=null;
let autoActive=false;
const btnAuto=document.getElementById('btn-auto');

btnAuto.addEventListener('click',()=>{
  initAudio();
  if(autoActive){
    clearInterval(autoInterval);
    autoActive=false;
    btnAuto.textContent='⏯ 自动敲击';
    btnAuto.classList.remove('active');
  }else{
    autoActive=true;
    btnAuto.textContent='⏸ 停止';
    btnAuto.classList.add('active');
    autoInterval=setInterval(()=>{
      knock();
    },600);
  }
});

// 重置（仅当日）
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(confirm('归零今日功德计数？')){todayCount=0;setToday(0);updateUI()}
});

// 键盘空格敲击
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'&&e.target===document.body){
    e.preventDefault();
    knock();
  }
});

updateUI();
</script>
</body>
</html>
