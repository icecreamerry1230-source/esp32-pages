<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>飞机大战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0b0e1a;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e8f0;padding:12px;touch-action:none;user-select:none;-webkit-user-select:none}
        .container{max-width:420px;width:100%}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .title{font-size:30px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
        .stats{display:flex;gap:8px}
        .stat-box{background:rgba(18,26,42,.9);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:6px 14px;text-align:center;min-width:55px}
        .stat-label{font-size:10px;color:#8896b0;letter-spacing:1px}
        .stat-value{font-size:20px;font-weight:600;color:#f0f4ff}
        .stat-value.best{color:#a78bfa}
        .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
        .btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#b0c4e0;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.5px;transition:.2s}
        .btn:hover{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:#60a5fa}
        .btn.primary{background:rgba(96,165,250,.12);border-color:#60a5fa;color:#60a5fa}
        .btn.primary:hover{background:rgba(96,165,250,.25)}
        .game-wrapper{background:rgba(18,26,42,.8);border-radius:14px;padding:8px;border:1px solid rgba(255,255,255,.06);box-shadow:inset 0 0 60px rgba(0,0,0,.3);position:relative}
        canvas{display:block;width:100%;border-radius:8px;background:linear-gradient(180deg,#0b1020,#0b0f1a)}
        .overlay{position:absolute;inset:0;background:rgba(11,14,26,.88);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s}
        .overlay.show{opacity:1;pointer-events:all}
        .overlay .msg{font-size:30px;font-weight:700;letter-spacing:2px;color:#f87171}
        .overlay .sub{font-size:14px;color:#8896b0}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">🛸 飞机大战</div>
        <div class="stats">
            <div class="stat-box"><div class="stat-label">分数</div><div class="stat-value" id="score">0</div></div>
            <div class="stat-box"><div class="stat-label">🏆</div><div class="stat-value best" id="best">0</div></div>
        </div>
    </div>
    <div class="toolbar">
        <button class="btn primary" id="restartBtn">⟳ 新游戏</button>
        <span style="font-size:11px;color:#5a6a85">拖拽飞机 / ←→ 移动</span>
    </div>
    <div class="game-wrapper" id="gameWrapper">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
            <div class="msg" id="overlayMsg">游戏结束</div>
            <div class="sub" id="overlaySub"></div>
            <button class="btn primary" id="overlayBtn">⟳ 再来一局</button>
        </div>
    </div>
</div>
<script>
(function(){
    const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
    const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
    const gameWrapper=document.getElementById('gameWrapper');
    const overlay=document.getElementById('overlay'),overlayMsg=document.getElementById('overlayMsg'),overlaySub=document.getElementById('overlaySub');

    let player,bullets,enemies,particles,score,bestScore,gameOver,gameLoop;
    let keys={},lastShot=0;

    function loadBest(){try{return parseInt(localStorage.getItem('shooter_best'))||0}catch{return 0}}
    function saveBest(v){try{localStorage.setItem('shooter_best',v)}catch{}}

    function init(){
        resizeCanvas();
        player={x:canvas.width/2,y:canvas.height-80,w:30,h:36};
        bullets=[];enemies=[];particles=[];
        score=0;gameOver=false;bestScore=loadBest();
        scoreEl.textContent='0';bestEl.textContent=bestScore;
        overlay.classList.remove('show');
        if(gameLoop)cancelAnimationFrame(gameLoop);
        loop();
    }

    function resizeCanvas(){
        const w=gameWrapper.clientWidth-16;
        canvas.width=Math.min(w,420);
        canvas.height=canvas.width*1.6;
    }

    function spawnEnemy(){
        const t=['basic','fast','big'][Math.floor(Math.random()*3)];
        const s={basic:{w:24,h:24,hp:1,speed:2,score:10},fast:{w:18,h:18,hp:1,speed:4,score:20},big:{w:36,h:36,hp:3,speed:1.2,score:50}}[t];
        enemies.push({x:Math.random()*(canvas.width-s.w),y:-s.h,w:s.w,h:s.h,hp:s.hp,maxHp:s.hp,speed:s.speed,score:s.score,type:t});
    }

    function loop(){
        if(gameOver)return;
        update();draw();
        gameLoop=requestAnimationFrame(loop);
    }

    function update(){
        // 移动
        if(keys['ArrowLeft']||keys['a'])player.x-=5;
        if(keys['ArrowRight']||keys['d'])player.x+=5;
        player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));

        // 射击
        const now=Date.now();
        if(now-lastShot>200){bullets.push({x:player.x+player.w/2-2,y:player.y,w:4,h:12});lastShot=now}

        // 子弹移动
        for(const b of bullets)b.y-=8;
        bullets=bullets.filter(b=>b.y+b.h>0);

        // 敌人生成
        if(Math.random()<.015+score/50000)spawnEnemy();

        // 敌人移动
        for(const e of enemies)e.y+=e.speed;
        enemies=enemies.filter(e=>e.y<canvas.height+50);

        // 碰撞检测
        for(let i=bullets.length-1;i>=0;i--){
            for(let j=enemies.length-1;j>=0;j--){
                if(collide(bullets[i],enemies[j])){
                    bullets.splice(i,1);
                    enemies[j].hp--;
                    if(enemies[j].hp<=0){
                        score+=enemies[j].score;
                        scoreEl.textContent=score;
                        spawnParticles(enemies[j].x+enemies[j].w/2,enemies[j].y+enemies[j].h/2,enemies[j].type);
                        enemies.splice(j,1);
                    }
                    break;
                }
            }
        }

        // 玩家碰撞
        for(const e of enemies){
            if(collide(player,e)){endGame();return}
        }

        // 粒子动画
        for(const p of particles){p.x+=p.dx;p.y+=p.dy;p.life--}
        particles=particles.filter(p=>p.life>0);
    }

    function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

    function spawnParticles(x,y,type){
        const colors={basic:'#f87171',fast:'#60a5fa',big:'#fbbf24'};
        for(let i=0;i<8;i++)particles.push({x,y,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,life:15,color:colors[type]||'#fff'});
    }

    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // 星星
        ctx.fillStyle='rgba(255,255,255,.1)';
        for(let i=0;i<30;i++){const sx=(i*127+score)%canvas.width,sy=(i*311+score*0.5)%canvas.height;ctx.fillRect(sx,sy,1.5,1.5)}

        // 子弹
        ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=6;
        for(const b of bullets)ctx.fillRect(b.x,b.y,b.w,b.h);
        ctx.shadowBlur=0;

        // 敌人
        for(const e of enemies){
            ctx.fillStyle={basic:'#f87171',fast:'#60a5fa',big:'#fbbf24'}[e.type];
            ctx.fillRect(e.x,e.y,e.w,e.h);
            if(e.type==='big'){ctx.fillStyle=`rgba(251,191,36,${e.hp/e.maxHp*.5})`;ctx.fillRect(e.x-2,e.y-2,e.w+4,e.h+4)}
        }

        // 玩家
        ctx.fillStyle='#60a5fa';ctx.shadowColor='#60a5fa';ctx.shadowBlur=10;
        ctx.beginPath();ctx.moveTo(player.x+player.w/2,player.y);ctx.lineTo(player.x+player.w,player.y+player.h);ctx.lineTo(player.x,player.y+player.h);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;

        // 粒子
        for(const p of particles){ctx.fillStyle=p.color;ctx.globalAlpha=p.life/15;ctx.fillRect(p.x-1,p.y-1,3,3)}
        ctx.globalAlpha=1;
    }

    function endGame(){
        gameOver=true;cancelAnimationFrame(gameLoop);
        if(score>bestScore){bestScore=score;saveBest(bestScore);bestEl.textContent=bestScore}
        overlayMsg.textContent='💥 坠毁了';
        overlaySub.textContent=`得分: ${score}`;
        overlay.classList.add('show');
    }

    document.addEventListener('keydown',e=>{keys[e.key]=true});document.addEventListener('keyup',e=>{keys[e.key]=false});
    canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();player.x=(e.touches[0].clientX-r.left)*(canvas.width/r.width)-player.w/2},{passive:false});
    canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();player.x=(e.touches[0].clientX-r.left)*(canvas.width/r.width)-player.w/2},{passive:false});
    document.getElementById('restartBtn').addEventListener('click',init);
    document.getElementById('overlayBtn').addEventListener('click',init);
    window.addEventListener('resize',resizeCanvas);
    init();
})();
</script>
</body>
</html>
