<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>粒子星空</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#020510;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none}canvas{display:block;position:fixed;inset:0}.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-family:system-ui,sans-serif;font-size:13px;letter-spacing:2px;pointer-events:none}.btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;z-index:2}.btn2{right:88px}.btn3{right:160px}</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">拖拽旋转 · 双指缩放 · 点击生成引力点</div>
<button class="btn" onclick="addAttractor()">+引力</button>
<button class="btn btn2" onclick="toggleLines()">连线</button>
<button class="btn btn3" onclick="resetView()">重置</button>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h,stars=[],attractors=[],showLines=true,zoom=1,ox=0,oy=0;
let targetZoom=1,targetOx=0,targetOy=0;
const STAR_COUNT=200;

function initStars(){
  stars=[];
  for(let i=0;i<STAR_COUNT;i++){
    const angle=Math.random()*Math.PI*2;
    const radius=50+Math.random()*300;
    const x=w/2+Math.cos(angle)*radius,y=h/2+Math.sin(angle)*radius;
    stars.push({x,y,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,size:.5+Math.random()*2,color:`hsl(${Math.random()*360},80%,${60+Math.random()*30}%)`,trail:[]});
  }
}

function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
if(stars.length===0)initStars();

function animate(){
  ctx.fillStyle='rgba(2,5,16,.2)';ctx.fillRect(0,0,w,h);
  zoom+=(targetZoom-zoom)*.1;ox+=(targetOx-ox)*.1;oy+=(targetOy-oy)*.1;

  const cx=w/2+ox,cy=h/2+oy;
  stars.forEach(s=>{
    // 引力
    if(attractors.length>0){
      for(const a of attractors){
        const dx=a.x-s.x,dy=a.y-s.y,dist=Math.sqrt(dx*dx+dy*dy)+.01;
        const force=Math.min(5,200/(dist*dist));
        s.dx+=dx/dist*force*.03;s.dy+=dy/dist*force*.03;
      }
      // 阻尼
      s.dx*=.998;s.dy*=.998;
    }
    s.x+=s.dx;s.y+=s.dy;
    // 边界回弹
    if(s.x<0||s.x>w)s.dx*=-1;
    if(s.y<0||s.y>h)s.dy*=-1;
    s.x=Math.max(0,Math.min(w,s.x));s.y=Math.max(0,Math.min(h,s.y));

    // 轨迹
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>15)s.trail.shift();

    // 连线
    if(showLines){
      for(let j=0;j<stars.length;j++){
        if(stars[j]===s)continue;
        const d=Math.hypot(s.x-stars[j].x,s.y-stars[j].y);
        if(d<100){
          ctx.strokeStyle=`rgba(255,255,255,${.08*(1-d/100)})`;
          ctx.lineWidth=.3;
          ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(stars[j].x,stars[j].y);ctx.stroke();
        }
      }
    }
  });

  // 引力点
  attractors.forEach(a=>{
    ctx.beginPath();ctx.arc(a.x,a.y,8,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fill();
    ctx.beginPath();ctx.arc(a.x,a.y,3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.fill();
    // 脉冲
    const r=8+Math.sin(Date.now()/500)*4;
    ctx.beginPath();ctx.arc(a.x,a.y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.1)';ctx.stroke();
  });

  // 绘制星星
  stars.forEach(s=>{
    // 轨迹
    if(s.trail.length>1){
      ctx.strokeStyle=s.color.replace('80%','20%');
      ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(s.trail[0].x,s.trail[0].y);
      for(let i=1;i<s.trail.length;i++)ctx.lineTo(s.trail[i].x,s.trail[i].y);
      ctx.stroke();
    }
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=s.size*4;
    ctx.fill();ctx.shadowBlur=0;
  });

  requestAnimationFrame(animate);
}
initStars();animate();

let dragging=false,dx0=0,dy0=0;
c.addEventListener('pointerdown',e=>{dragging=true;dx0=e.clientX;dy0=e.clientY});
c.addEventListener('pointermove',e=>{
  if(!dragging)return;
  targetOx+=e.clientX-dx0;targetOy+=e.clientY-dy0;
  dx0=e.clientX;dy0=e.clientY;
});
c.addEventListener('pointerup',()=>{dragging=false});
c.addEventListener('click',e=>{if(dragging){dragging=false;return}addAttractor(e.clientX,e.clientY)});
c.addEventListener('wheel',e=>{e.preventDefault();targetZoom*=e.deltaY<0?1.1:.9;targetZoom=Math.max(.5,Math.min(3,targetZoom))},{passive:false});

let pinchStart=0,pinchZ=1;
c.addEventListener('touchstart',e=>{if(e.touches.length===2){pinchStart=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchZ=targetZoom}});
c.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);targetZoom=pinchZ*(d/pinchStart);targetZoom=Math.max(.5,Math.min(3,targetZoom))}},{passive:false});

function addAttractor(x,y){if(!x)return;attractors.push({x,y});if(attractors.length>5)attractors.shift()}
function toggleLines(){showLines=!showLines;document.querySelector('.btn2').textContent=showLines?'连线:开':'连线:关'}
function resetView(){attractors=[];targetZoom=1;targetOx=0;targetOy=0;stars=[];initStars()}
</script>
</body>
</html>
