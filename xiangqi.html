<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>中国象棋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0b0e1a;font-family:system-ui,sans-serif;
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;color:#e0e8f0;padding:10px;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
}
.wrap{width:100%;max-width:460px}
.back{color:#6a7a95;text-decoration:none;font-size:13px;letter-spacing:1px;display:inline-block;margin-bottom:6px}
.back:hover{color:#fbbf24}
.top{display:flex;justify-content:space-between;align-items:center;margin:6px 0}
.top .turn{font-size:15px;font-weight:600}
.red-text{color:#e53e3e}
.black-text{color:#c0c8d0}
#ai-hint{font-size:12px;color:#5a6a85}
canvas{display:block;margin:0 auto;border-radius:12px;background:#f0d9a0;
  box-shadow:0 4px 24px rgba(0,0,0,.3)}
.btns{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0}
.btns button{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#a0a8b0;padding:8px 16px;border-radius:14px;font-size:13px;
  cursor:pointer;transition:all .15s;
}
.btns button:active{background:rgba(255,255,255,.1)}
.btns button.on{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.3);color:#fbbf24}
#log{
  background:rgba(18,26,42,.6);border-radius:10px;padding:8px 12px;
  max-height:80px;overflow-y:auto;font-size:12px;color:#5a6a85;line-height:1.7
}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="games.html">← 游戏</a>
  <div class="top">
    <span class="turn"><span id="st">红方走棋</span></span>
    <span id="ai-hint"></span>
  </div>
  <canvas id="c"></canvas>
  <div class="btns">
    <button id="btn-pvp" class="on">👥 双人</button>
    <button id="btn-ai">🤖 人机</button>
    <button id="btn-undo">↩ 悔棋</button>
    <button id="btn-reset">🔄 新局</button>
  </div>
  <div id="log"></div>
</div>

<script>
// ═══ 常量 ═══
const ROWS=10,COLS=9;
const RED='r',BLACK='b';
// 棋子类型数字
const T={GENERAL:0,ADVISOR:1,ELEPHANT:2,HORSE:3,ROOK:4,CANNON:5,PAWN:6};

const NAMES={r:{0:'帥',1:'仕',2:'相',3:'馬',4:'車',5:'炮',6:'兵'},
             b:{0:'將',1:'士',2:'象',3:'馬',4:'車',5:'砲',6:'卒'}};

function newPiece(color,type){return{color,type}}

function initBoard(){
  const b=[];
  for(let r=0;r<ROWS;r++){b[r]=Array(COLS).fill(null)}
  const B=(r,c,color,type)=>{b[r][c]=newPiece(color,type)};
  // 黑方 top
  B(0,4,BLACK,0);B(0,3,BLACK,1);B(0,5,BLACK,1);B(0,2,BLACK,2);B(0,6,BLACK,2);
  B(0,1,BLACK,3);B(0,7,BLACK,3);B(0,0,BLACK,4);B(0,8,BLACK,4);
  B(2,1,BLACK,5);B(2,7,BLACK,5);
  B(3,0,BLACK,6);B(3,2,BLACK,6);B(3,4,BLACK,6);B(3,6,BLACK,6);B(3,8,BLACK,6);
  // 红方 bottom
  B(9,4,RED,0);B(9,3,RED,1);B(9,5,RED,1);B(9,2,RED,2);B(9,6,RED,2);
  B(9,1,RED,3);B(9,7,RED,3);B(9,0,RED,4);B(9,8,RED,4);
  B(7,1,RED,5);B(7,7,RED,5);
  B(6,0,RED,6);B(6,2,RED,6);B(6,4,RED,6);B(6,6,RED,6);B(6,8,RED,6);
  return b;
}

// ═══ Canvas 设置 ═══
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const PAD=20;
let CS=46; // cell size

function resizeCanvas(){
  const maxW=Math.min(window.innerWidth-20,cv.parentElement.clientWidth||440,460);
  CS=Math.floor((maxW-PAD*2)/8);
  if(CS<28)CS=28;
  const w=CS*8+PAD*2, h=CS*9+PAD*2;
  cv.width=w; cv.height=h;
  cv.style.width=w+'px'; cv.style.height=h+'px';
}

function cx(col){return PAD+col*CS}
function cy(row){return PAD+row*CS}

// ═══ 音频 ═══
let actx;
function aInit(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}
function snd(t,f0,f1,ty,wav){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=wav||'sine';o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(f1,t+.06);
  g.gain.setValueAtTime(ty,t);g.gain.exponentialRampToValueAtTime(0.001,t+.1);
  o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.12);
}
function sndMove(){const t=actx.currentTime;snd(t,600,300,.08,'sine')}
function sndCap(){const t=actx.currentTime;snd(t,200,50,.12,'sawtooth')}
function sndCheck(){const t=actx.currentTime;snd(t,900,600,.1,'sine');setTimeout(()=>snd(t+.07,1100,800,.1,'sine'),70)}

// ═══ 状态 ═══
let board,sel,turn,hist,log,gameMode,ended,computing;

function reset(){
  board=initBoard();sel=null;turn=RED;hist=[];log=[];ended=false;computing=false;
  document.getElementById('log').innerHTML='';
  document.getElementById('ai-hint').textContent='';
  updateTurn();
  draw();
}

// ═══ 走法生成 ═══
function inBoard(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS}
function inPalace(r,c,color){return c>=3&&c<=5&&(color===RED?r>=7:r<=2)}

function movesOf(r,c){
  const p=board[r][c];if(!p)return[];
  const ms=[],{color,type}=p;
  function add(tr,tc){if(!inBoard(tr,tc))return;const t=board[tr][tc];if(t&&t.color===color)return;ms.push({r,c,tr,tc,cap:!!t,orig:board[tr][tc]})}
  function slide(dr,dc,cb){let rr=r+dr,cc=c+dc;while(inBoard(rr,cc)){cb(rr,cc);if(board[rr][cc])break;rr+=dr;cc+=dc}}

  if(type===0){ // 将
    for(const[d,e]of[[-1,0],[1,0],[0,-1],[0,1]]){const tr=r+d,tc=c+e;if(inBoard(tr,tc)&&inPalace(tr,tc,color))add(tr,tc)}
    // 飞将
    const og=findGen(color===RED?BLACK:RED);
    if(og&&c===og.c){let blk=false;for(let rr=Math.min(r,og.r)+1;rr<Math.max(r,og.r);rr++)if(board[rr][c]){blk=true;break}if(!blk)add(og.r,og.c)}
  }else if(type===1){ // 士
    for(const[d,e]of[[-1,-1],[-1,1],[1,-1],[1,1]]){const tr=r+d,tc=c+e;if(inBoard(tr,tc)&&inPalace(tr,tc,color))add(tr,tc)}
  }else if(type===2){ // 象
    for(const[d,e,bd,be]of[[-2,-2,-1,-1],[-2,2,-1,1],[2,-2,1,-1],[2,2,1,1]]){
      const tr=r+d,tc=c+e;if(!inBoard(tr,tc))continue;
      if(color===RED&&tr<5)continue;if(color===BLACK&&tr>4)continue;
      if(board[r+bd][c+be])continue;add(tr,tc)
    }
  }else if(type===3){ // 马
    for(const[d,e,bd,be]of[[-2,-1,-1,0],[-2,1,-1,0],[2,-1,1,0],[2,1,1,0],[-1,-2,0,-1],[-1,2,0,1],[1,-2,0,-1],[1,2,0,1]]){
      const tr=r+d,tc=c+e;if(!inBoard(tr,tc))continue;if(board[r+bd][c+be])continue;add(tr,tc)
    }
  }else if(type===4){ // 车
    for(const[d,e]of[[-1,0],[1,0],[0,-1],[0,1]])slide(d,e,add)
  }else if(type===5){ // 炮
    for(const[d,e]of[[-1,0],[1,0],[0,-1],[0,1]])slide(d,e,(tr,tc)=>{if(!board[tr][tc])add(tr,tc)});
    for(const[d,e]of[[-1,0],[1,0],[0,-1],[0,1]]){let sr=r+d,sc=c+e,found=false;while(inBoard(sr,sc)){if(!found){if(board[sr][sc])found=true}else{if(board[sr][sc]){add(sr,sc);break}}sr+=d;sc+=e}}
  }else if(type===6){ // 兵
    const fwd=color===RED?-1:1;add(r+fwd,c);if((color===RED?r<=4:r>=5)){add(r,c-1);add(r,c+1)}
  }
  return ms;
}

function findGen(color){for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]&&board[r][c].color===color&&board[r][c].type===0)return{r,c};return null}

function isCheck(color){
  const g=findGen(color);if(!g)return true;
  const opp=color===RED?BLACK:RED;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]&&board[r][c].color===opp)for(const m of movesOf(r,c))if(m.tr===g.r&&m.tc===g.c)return true;
  return false;
}

function isMate(color){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]&&board[r][c].color===color)for(const m of movesOf(r,c)){doMove(m);const ok=!isCheck(color);undoMove(m);if(ok)return false}
  return true;
}

function doMove(m){const cap=board[m.tr][m.tc];board[m.tr][m.tc]=board[m.r][m.c];board[m.r][m.c]=null;return cap}
function undoMove(m){board[m.r][m.c]=board[m.tr][m.tc];board[m.tr][m.tc]=m.orig}

// ═══ AI ═══
const VAL={0:10000,1:20,2:25,3:40,4:90,5:45,6:10};

function evaluate(){
  let s=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p)continue;
    let v=VAL[p.type];
    // 兵过河加分
    if(p.type===6){v+=(p.color===RED?r<=4:r>=5)?5:0}
    // 位置中心加分（简单）
    if(p.type===4||p.type===5)v+=1;
    s+=(p.color===RED?1:-1)*v;
  }
  return s;
}

function allMoves(color){
  const ms=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]&&board[r][c].color===color)for(const m of movesOf(r,c)){doMove(m);if(!isCheck(color)){undoMove(m);ms.push(m)}else undoMove(m)}
  ms.sort((a,b)=>{const va=a.orig?VAL[a.orig.type]||0:0,vb=b.orig?VAL[b.orig.type]||0:0;return vb-va});
  return ms;
}

function search(depth,alpha,beta,maxi){
  if(depth===0)return evaluate();
  const color=maxi?RED:BLACK;
  const ms=allMoves(color);
  if(ms.length===0)return maxi?-99999:99999;
  if(maxi){let best=-Infinity;for(const m of ms){doMove(m);const v=search(depth-1,alpha,beta,false);undoMove(m);if(v>best)best=v;if(best>alpha)alpha=best;if(alpha>=beta)break}return best}
  else{let best=Infinity;for(const m of ms){doMove(m);const v=search(depth-1,alpha,beta,true);undoMove(m);if(v<best)best=v;if(best<beta)beta=best;if(alpha>=beta)break}return best}
}

function aiThink(){
  const ms=allMoves(RED);if(ms.length===0)return null;
  let best=ms[0],bv=-Infinity;
  for(const m of ms){doMove(m);const v=search(2,-Infinity,Infinity,false);undoMove(m);if(v>bv){bv=v;best=m}}
  return best;
}

// ═══ 渲染 ═══
function draw(){
  resizeCanvas();
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // 底色
  ctx.fillStyle='#f0d9a0';ctx.fillRect(0,0,W,H);

  // 网格
  ctx.strokeStyle='#4a3520';ctx.lineWidth=1;
  for(let r=0;r<ROWS;r++){ctx.beginPath();ctx.moveTo(cx(0),cy(r));ctx.lineTo(cx(8),cy(r));ctx.stroke()}
  for(let c=0;c<COLS;c++){
    if(c===0||c===8){ctx.beginPath();ctx.moveTo(cx(c),cy(0));ctx.lineTo(cx(c),cy(9));ctx.stroke()}
    else{ctx.beginPath();ctx.moveTo(cx(c),cy(0));ctx.lineTo(cx(c),cy(4));ctx.stroke();ctx.beginPath();ctx.moveTo(cx(c),cy(5));ctx.lineTo(cx(c),cy(9));ctx.stroke()}
  }
  // 九宫斜线
  ctx.lineWidth=.7;
  [[0,2],[7,9]].forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(cx(3),cy(a));ctx.lineTo(cx(5),cy(b));ctx.stroke();ctx.beginPath();ctx.moveTo(cx(5),cy(a));ctx.lineTo(cx(3),cy(b));ctx.stroke()});
  // 楚河汉界
  ctx.fillStyle='#4a3520';ctx.font=`${Math.floor(CS*.38)}px serif`;ctx.textAlign='center';
  ctx.fillText('楚  河',cx(1.5),cy(4.55));ctx.fillText('汉  界',cx(6.5),cy(4.55));

  // 选中方块的合法走法
  if(sel&&!ended&&!computing){
    const ms=movesOf(sel.r,sel.c).filter(m=>{doMove(m);const ok=!isCheck(sel.color);undoMove(m);return ok});
    // 选中高亮
    ctx.fillStyle='rgba(255,215,0,.25)';ctx.fillRect(cx(sel.c)-CS*.44,cy(sel.r)-CS*.44,CS*.88,CS*.88);
    for(const m of ms){
      ctx.fillStyle=m.cap?'rgba(239,68,68,.35)':'rgba(74,222,128,.3)';
      ctx.beginPath();ctx.arc(cx(m.tc),cy(m.tr),CS*.17,0,Math.PI*2);ctx.fill();
    }
  }

  // 最后一步标记
  if(hist.length>0){
    const last=hist[hist.length-1];
    [{r:last.r,c:last.c,col:'rgba(0,128,0,.4)'},{r:last.tr,c:last.tc,col:'rgba(220,38,38,.4)'}].forEach(({r,c,col})=>{
      const x=cx(c),y=cy(r),s=CS*.16;
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x-s,y-s);ctx.lineTo(x+s,y+s);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+s,y-s);ctx.lineTo(x-s,y+s);ctx.stroke();
    });
  }

  // 棋子
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p)continue;
    const x=cx(c),y=cy(r),R=CS*.43;
    // 阴影
    ctx.beginPath();ctx.arc(x+2,y+2,R,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.18)';ctx.fill();
    // 棋子
    const grd=ctx.createRadialGradient(x-R*.3,y-R*.3,R*.1,x,y,R);
    grd.addColorStop(0,'#fefce8');grd.addColorStop(1,'#d4b060');
    ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    ctx.strokeStyle='#8a6a30';ctx.lineWidth=1.6;ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,R*.78,0,Math.PI*2);ctx.strokeStyle='#b89640';ctx.lineWidth=.7;ctx.stroke();
    // 字
    ctx.fillStyle=p.color===RED?'#c53030':'#1a202c';
    ctx.font=`bold ${Math.floor(CS*.44)}px "KaiTi","STKaiti",serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(NAMES[p.color][p.type],x,y+1);
  }
}

// ═══ 交互 ═══
function clickAt(mx,my){
  if(ended||computing)return;
  const rect=cv.getBoundingClientRect();
  const rx=(mx-rect.left)*(cv.width/rect.width);
  const ry=(my-rect.top)*(cv.height/rect.height);
  const col=Math.round((rx-PAD)/CS);
  const row=Math.round((ry-PAD)/CS);
  if(!inBoard(row,col))return;

  const p=board[row][col];
  if(sel){
    if(p&&p.color===sel.color){sel=board[row][col]?{r:row,c:col,color:p.color}:null;draw();return}
    const ms=movesOf(sel.r,sel.c).filter(m=>{doMove(m);const ok=!isCheck(sel.color);undoMove(m);return ok});
    const m=ms.find(m=>m.tr===row&&m.tc===col);
    if(!m)return;
    aInit();
    doMove(m);hist.push(m);
    if(m.cap)sndCap();else sndMove();
    addLog((sel.color===RED?'红':'黑')+NAMES[sel.color][board[m.tr][m.tc].type]+pName(m.r,m.c)+'→'+pName(m.tr,m.tc)+(m.cap?' 吃':''));
    sel=null;turn=turn===RED?BLACK:RED;
    if(isCheck(turn)){
      if(isMate(turn)){ended=true;addLog('🏆 '+(turn===RED?'黑方':'红方')+'获胜！')}
      else{sndCheck();addLog('⚠ 将军！')}
    }
    updateTurn();draw();
    // AI
    if(!ended&&gameMode==='ai'&&turn===RED){doAI()}
  }else{
    if(p&&p.color===turn&&!(gameMode==='ai'&&turn===RED)){sel={r:row,c:col,color:p.color};draw()}
  }
}

function doAI(){
  computing=true;document.getElementById('ai-hint').textContent='🤔 AI思考...';
  setTimeout(()=>{
    const m=aiThink();
    if(m){
      aInit();
      doMove(m);hist.push(m);
      if(m.cap)sndCap();else sndMove();
      addLog('🤖 AI '+NAMES[RED][board[m.tr][m.tc].type]+pName(m.r,m.c)+'→'+pName(m.tr,m.tc)+(m.cap?' 吃':''));
      turn=BLACK;
      if(isCheck(BLACK)){
        if(isMate(BLACK)){ended=true;addLog('🏆 红方获胜！')}
        else{sndCheck();addLog('⚠ 将军！')}
      }
      updateTurn();draw();
    }
    computing=false;document.getElementById('ai-hint').textContent='';
  },150);
}

function doUndo(){
  if(ended||computing||hist.length===0)return;
  if(gameMode==='ai'&&hist.length>=2){
    const m2=hist.pop();board[m2.r][m2.c]=board[m2.tr][m2.tc];board[m2.tr][m2.tc]=m2.orig;
    const m1=hist.pop();board[m1.r][m1.c]=board[m1.tr][m1.tc];board[m1.tr][m1.tc]=m1.orig;
    turn=BLACK;
  }else if(gameMode==='pvp'){
    const m=hist.pop();board[m.r][m.c]=board[m.tr][m.tc];board[m.tr][m.tc]=m.orig;
    turn=turn===RED?BLACK:RED;
  }
  sel=null;ended=false;updateTurn();draw();
}

function pName(r,c){return String.fromCharCode(97+c)+(10-r)} // a0..i9
function addLog(msg){log.push(msg);const el=document.getElementById('log');el.innerHTML+=`<div>${msg}</div>`;el.scrollTop=el.scrollHeight;if(el.children.length>30)el.firstChild.remove()}
function updateTurn(){
  const el=document.getElementById('st');
  if(turn===RED){el.textContent='红方走棋';el.className='red-text'}
  else{el.textContent='黑方走棋';el.className='black-text'}
}

function setMode(m){
  gameMode=m;
  document.getElementById('btn-pvp').classList.toggle('on',m==='pvp');
  document.getElementById('btn-ai').classList.toggle('on',m==='ai');
  reset();
}

// 事件
cv.addEventListener('pointerdown',e=>{e.preventDefault();clickAt(e.clientX,e.clientY)});
document.getElementById('btn-pvp').addEventListener('click',()=>setMode('pvp'));
document.getElementById('btn-ai').addEventListener('click',()=>setMode('ai'));
document.getElementById('btn-undo').addEventListener('click',doUndo);
document.getElementById('btn-reset').addEventListener('click',reset);

// 启动
gameMode='pvp';
resizeCanvas();
reset();
window.addEventListener('resize',()=>{resizeCanvas();draw()});
</script>
</body>
</html>
