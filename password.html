<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>密码生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e8f0;padding:20px}
.c{max-width:400px;width:100%}
.back{color:#6a7a95;text-decoration:none;font-size:13px;letter-spacing:1px;display:inline-block;margin-bottom:20px}
.back:hover{color:#a78bfa}
h1{font-size:20px;font-weight:300;letter-spacing:3px;color:#a78bfa;margin-bottom:20px;text-align:center}
.pwd{background:rgba(18,26,42,.8);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;font-size:22px;font-family:monospace;text-align:center;word-break:break-all;color:#4ade80;margin-bottom:12px;min-height:60px;display:flex;align-items:center;justify-content:center}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.row label{font-size:14px}
.row input[type=range]{width:120px}
.row input[type=checkbox]{width:18px;height:18px;accent-color:#a78bfa}
.row .val{font-size:13px;color:#fbbf24;min-width:30px;text-align:right}
button{width:100%;padding:12px;border-radius:14px;font-size:16px;cursor:pointer;margin-top:12px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80}
button:active{transform:scale(.97)}
.btns{display:flex;gap:8px}
.btns button:last-child{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.2);color:#a78bfa}
.strength{text-align:center;font-size:12px;margin-top:4px;min-height:18px}
</style>
</head>
<body>
<div class="c">
  <a class="back" href="tools.html">← 工具</a>
  <h1>🔐 密码生成器</h1>
  <div class="pwd" id="pwd">点击生成</div>
  <div class="strength" id="str"></div>
  <div class="row"><label>长度</label><input type="range" min="6" max="64" value="16" id="len" oninput="document.getElementById('lv').textContent=this.value;gen()"><span class="val" id="lv">16</span></div>
  <div class="row"><label>大写字母 A-Z</label><input type="checkbox" checked id="up" onchange="gen()"></div>
  <div class="row"><label>小写字母 a-z</label><input type="checkbox" checked id="lo" onchange="gen()"></div>
  <div class="row"><label>数字 0-9</label><input type="checkbox" checked id="num" onchange="gen()"></div>
  <div class="row"><label>特殊符号 !@#$</label><input type="checkbox" id="sym" onchange="gen()"></div>
  <div class="btns">
    <button onclick="gen()">🔄 生成新密码</button>
    <button onclick="copy()">📋 复制</button>
  </div>
</div>
<script>
const chars={up:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lo:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()_+-=[]{}|;:,.<>?'};
function gen(){
  let pool='';
  if(document.getElementById('up').checked)pool+=chars.up;
  if(document.getElementById('lo').checked)pool+=chars.lo;
  if(document.getElementById('num').checked)pool+=chars.num;
  if(document.getElementById('sym').checked)pool+=chars.sym;
  if(!pool){document.getElementById('pwd').textContent='请勾选一种字符';return}
  const len=parseInt(document.getElementById('len').value);
  let pwd='';for(let i=0;i<len;i++)pwd+=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('pwd').textContent=pwd;
  const ent=pool.length;
  const bits=Math.floor(Math.log2(ent)*len);
  const s=bits<40?'弱':bits<60?'中':bits<80?'强':'极强';
  document.getElementById('str').textContent='🔒 熵: ~'+bits+' bit · 强度: '+s;
  document.getElementById('str').style.color=bits<40?'#ef4444':bits<60?'#fbbf24':bits<80?'#4ade80':'#a78bfa';
}
function copy(){
  const t=document.getElementById('pwd').textContent;
  navigator.clipboard?.writeText(t).then(()=>{const b=document.querySelector('.btns button:last-child');b.textContent='✅ 已复制';setTimeout(()=>b.textContent='📋 复制',1500)}).catch(()=>alert('复制失败'));
}
gen();
</script>
</body>
</html>
