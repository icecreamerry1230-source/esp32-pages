<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特效 - 视觉体验</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #e0e8f0; padding: 20px;
        }
        .container { text-align: center; max-width: 420px; width: 100%; }
        .back {
            display: inline-block; color: #6a7a95; text-decoration: none;
            font-size: 14px; margin-bottom: 24px; letter-spacing: 1px;
            transition: color 0.2s;
        }
        .back:hover { color: #a78bfa; }
        h1 {
            font-size: 28px; font-weight: 300; letter-spacing: 3px;
            background: linear-gradient(135deg, #fbbf24, #f97316);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
        }
        .card {
            display: block;
            background: rgba(18,26,42,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 28px 24px; margin-bottom: 14px;
            text-decoration: none;
            transition: all 0.25s;
        }
        .card:hover { border-color: rgba(251,191,36,0.25); transform: translateY(-2px); }
        .card .icon { font-size: 44px; margin-bottom: 10px; }
        .card .name { font-size: 20px; font-weight: 600; color: #e0e8f0; margin-bottom: 6px; }
        .card .desc { font-size: 13px; color: #6a7a95; }
        .card .tip { font-size: 11px; color: #4a5a75; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="index.html">← 返回首页</a>
    <h1>✨ 特效</h1>

    <a class="card" href="fireworks.html">
        <div class="icon">🎆</div>
        <div class="name">粒子烟花</div>
        <div class="desc">点击绽放烟花 · 粒子爆炸效果</div>
        <div class="tip">点击屏幕任意位置发射烟花</div>
    </a>
    <a class="card" href="kaleidoscope.html">
        <div class="icon">🌀</div>
        <div class="name">万花筒绘画</div>
        <div class="desc">对称镜像绘图 · 可变花瓣数</div>
        <div class="tip">手指拖动绘制 · 自动渐变色彩</div>
    </a>
</div>
</body>
</html>
