<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>几何精度因子 DOP</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050a18;font-family:system-ui,sans-serif;display:flex;min-height:100vh;color:#e0e0e0;flex-direction:column;align-items:center;padding:16px}
.back{color:rgba(255,255,255,.4);text-decoration:none;font-size:12px;align-self:flex-start;margin-bottom:8px;letter-spacing:1px}.back:hover{color:#4a9eff}
h1{font-size:20px;font-weight:300;letter-spacing:2px;margin-bottom:4px}p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px}
canvas{border-radius:12px;border:1px solid rgba(255,255,255,.05);cursor:pointer}
.info{font-size:12px;margin-top:8px;color:rgba(255,255,255,.5);text-align:center}.info b{color:#ffd700}
.ctrls{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.ctrls button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:10px;font-size:12px;cursor:pointer}.ctrls button.on{background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.25);color:#4a9eff}
</style>
</head>
<body>
<a class="back" href="satellite-hub.html">← 合集</a>
<h1>📐 几何精度因子 (DOP)</h1>
<p>卫星空间分布决定定位精度。卫星聚在一起→DOP高→精度差；分散→DOP低→精度好</p>
<canvas id="c" width="750" height="480"></canvas>
<div class="info"><span>GDOP: <b id="gdop">--</b></span> &nbsp; PDOP: <b id="pdop">--</b> &nbsp; HDOP: <b id="hdop">--</b> &nbsp; VDOP: <b id="vdop">--</b></div>
<div class="ctrls">
  <button onclick="goodLayout()">✅ 优秀布局</button><button onclick="badLayout()">❌ 差布局</button><button onclick="randomLayout()">🎲 随机</button>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let sats=[],receiver={x:200,y:380};

function goodLayout(){
  sats=[{x:120,y:80},{x:380,y:50},{x:620,y:120},{x:680,y:380},{x:350,y:420}];
  draw();
}
function badLayout(){
  sats=[{x:330,y:180},{x:360,y:170},{x:390,y:195},{x:350,y:210},{x:310,y:200}];
  draw();
}
function randomLayout(){
  sats=[];for(let i=0;i<5;i++)sats.push({x:80+Math.random()*590,y:50+Math.random()*380});
  draw();
}

function calcDOP(){
  if(sats.length<4)return{g:99,p:99,h:99,v:99};
  // 简化2D DOP计算
  let H=[]; // 设计矩阵
  const rx=receiver.x,ry=receiver.y;
  for(const s of sats){
    const dx=s.x-rx,dy=s.y-ry,dz=450-250; // 固定高度差
    const rho=Math.sqrt(dx*dx+dy*dy+dz*dz);
    H.push([dx/rho,dy/rho,dz/rho,1]);
  }
  // (H^T H)^-1
  const n=sats.length;
  // 简化：用卫星张角估算
  let sumX=0,sumY=0,sumZ=0;
  for(const s of sats){
    const dx=s.x-rx,dy=s.y-ry;
    const rho=Math.sqrt(dx*dx+dy*dy+250*250);
    sumX+=dx/rho;sumY+=dy/rho;sumZ+=250/rho;
  }
  // 方差
  const varX=1/(n-sumX*sumX/n+0.001),varY=1/(n-sumY*sumY/n+0.001),varZ=1/(n-sumZ*sumZ/n+0.001),varT=1/(n+0.001);
  const gdop=Math.sqrt(varX+varY+varZ+varT);
  const pdop=Math.sqrt(varX+varY+varZ);
  const hdop=Math.sqrt(varX+varY);
  const vdop=Math.sqrt(varZ);
  return{g:Math.min(gdop*5,99),p:Math.min(pdop*4,99),h:Math.min(hdop*3,99),v:Math.min(vdop*6,99)};
}

function draw(){
  ctx.clearRect(0,0,750,480);
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,750,480);

  // 天空半球
  const cx=receiver.x,cy=receiver.y;
  const skyGrad=ctx.createRadialGradient(cx,cy,10,cx,cy,320);
  skyGrad.addColorStop(0,'rgba(74,158,255,.06)');skyGrad.addColorStop(1,'rgba(74,158,255,.0)');
  ctx.fillStyle=skyGrad;ctx.beginPath();ctx.arc(cx,cy,320,0,Math.PI*2);ctx.fill();

  // 方位环
  ctx.strokeStyle='rgba(255,215,0,.1)';ctx.lineWidth=1;
  [80,160,240,320].forEach(r=>{ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()});
  // 十字线
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.beginPath();ctx.moveTo(cx-320,cy);ctx.lineTo(cx+320,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-280);ctx.lineTo(cx,cy+180);ctx.stroke();

  // 仰角标
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.font='9px system-ui';ctx.textAlign='center';
  ctx.fillText('天顶',cx,cy-280);ctx.fillText('地平线',cx,cy+180);

  // 卫星
  const px = [], py = [];
  sats.forEach((s,i)=>{
    const dx2=s.x-cx,dy2=s.y-cy;
    ctx.fillStyle='#4a9eff';ctx.beginPath();ctx.arc(s.x,s.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.fillText('🛰️'+(i+1),s.x,s.y+3);
    // 俯仰角线
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(cx,cy);ctx.stroke();
    px.push(s.x); py.push(s.y);
  });

  // 接收机
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='12px system-ui';ctx.fillText('📍',cx,cy+3);
  ctx.fillText('接收机',cx,cy+24);

  // 卫星分布多边形（凸包）
  if(sats.length>=3){
    // 简单凸包
    const hull=convexHull(sats.map(s=>({x:s.x,y:s.y})));
    ctx.strokeStyle='rgba(74,158,255,.3)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();
    hull.forEach((p,i)=>{
      if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
    });
    ctx.closePath();ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(74,158,255,.03)';ctx.fill();
  }

  // DOP值面板
  const dop=calcDOP();
  const grades=[
    {label:'GDOP',val:dop.g,th:[2,6,10],x:560,y:40},
    {label:'PDOP',val:dop.p,th:[1.5,4,8],x:560,y:90},
    {label:'HDOP',val:dop.h,th:[1,3,6],x:560,y:140},
    {label:'VDOP',val:dop.v,th:[1.5,4,8],x:560,y:190},
  ];
  grades.forEach(g=>{
    const color=g.val<g.th[0]?'#4ade80':g.val<g.th[1]?'#fbbf24':g.val<g.th[2]?'#f97316':'#ef4444';
    ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(g.x-10,g.y-6,100,36);
    ctx.fillStyle=color;ctx.font='bold 16px system-ui';ctx.textAlign='left';
    ctx.fillText(g.label+': '+g.val.toFixed(1),g.x,g.y+10);
    // 质量条
    ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(g.x,g.y+16,80,4);
    const pct=Math.min(g.val/15*80,80);
    ctx.fillStyle=color;ctx.fillRect(g.x,g.y+16,pct,4);
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='9px system-ui';
    const desc=g.val<g.th[0]?'优':g.val<g.th[1]?'良':g.val<g.th[2]?'中':'差';
    ctx.fillText(desc,g.x+84,g.y+20);
  });

  // 图例
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='11px system-ui';ctx.textAlign='left';
  ctx.fillText('DOP越低=精度越好',30,450);
  ctx.fillText('卫星分散→低DOP',30,465);
  ctx.fillText('卫星聚集→高DOP',160,465);

  document.getElementById('gdop').textContent=dop.g.toFixed(1);
  document.getElementById('pdop').textContent=dop.p.toFixed(1);
  document.getElementById('hdop').textContent=dop.h.toFixed(1);
  document.getElementById('vdop').textContent=dop.v.toFixed(1);
}

function convexHull(points){
  points=points.slice().sort((a,b)=>a.x-b.x||a.y-b.y);
  const lower=[];
  for(const p of points){
    while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop();
    lower.push(p);
  }
  const upper=[];
  for(let i=points.length-1;i>=0;i--){
    const p=points[i];
    while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop();
    upper.push(p);
  }
  return lower.concat(upper.slice(1,-1));
}
function cross(o,a,b){return(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x)}

c.addEventListener('pointermove',e=>{
  if(e.buttons){
    const r=c.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    // 拖拽最近的卫星
    let closest=-1,minD=Infinity;
    sats.forEach((s,i)=>{const d=(s.x-mx)**2+(s.y-my)**2;if(d<minD){minD=d;closest=i}});
    if(closest>=0&&minD<2500){sats[closest].x=mx;sats[closest].y=my;draw()}
  }
});

goodLayout();
</script>
</body>
</html>
