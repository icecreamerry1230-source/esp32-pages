<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>分形探索</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none}canvas{display:block;position:fixed;inset:0}.info{position:fixed;top:16px;left:16px;color:rgba(255,255,255,.4);font-family:system-ui,sans-serif;font-size:12px;z-index:1;pointer-events:none;line-height:1.6}.btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;z-index:2}.btn2{right:90px}.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-family:system-ui,sans-serif;font-size:13px;letter-spacing:2px;pointer-events:none}</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info">🔍 拖拽移动 · 双指缩放<br>或鼠标滚轮缩放</div>
<button class="btn" onclick="resetView()">重置</button>
<button class="btn btn2" onclick="cycleColors()">配色</button>
<div class="label">Mandelbrot 集合</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h,centerX=-.75,centerY=0,scale=200,iterMax=150,colorScheme=0;
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
resize();window.addEventListener('resize',()=>{resize();render()});

function render(){
  const img=ctx.createImageData(w,h),data=img.data;
  for(let py=0;py<h;py++){
    for(let px=0;px<w;px++){
      const x0=(px-w/2)/scale+centerX;
      const y0=(py-h/2)/scale+centerY;
      let x=0,y=0,iter=0;
      while(x*x+y*y<4&&iter<iterMax){const xt=x*x-y*y+x0;y=2*x*y+y0;x=xt;iter++}
      const idx=(py*w+px)*4;
      if(iter===iterMax){data[idx]=data[idx+1]=data[idx+2]=0;data[idx+3]=255}
      else{
        const t=iter/iterMax;
        let r,g,b;
        if(colorScheme===0){r=t<.5?t*2*255:255;g=t<.5?0:(t-.5)*2*255;b=t<.3?t/0.3*100:255-t*255}
        else if(colorScheme===1){const h=t*360;const s=.8,l=.5;const c=l*s,x=h/60,m=c*(1-Math.abs(x%2-1));let rp,gp,bp;if(x<1){rp=c;gp=m;bp=0}else if(x<2){rp=m;gp=c;bp=0}else if(x<3){rp=0;gp=c;bp=m}else if(x<4){rp=0;gp=m;bp=c}else if(x<5){rp=m;gp=0;bp=c}else{rp=c;gp=0;bp=m}r=rp*255;g=gp*255;b=bp*255}
        else{r=t*200;g=t<.5?t*2*150+50:(1-t)*2*150+50;b=(1-t)*255}
        data[idx]=r;data[idx+1]=g;data[idx+2]=b;data[idx+3]=255;
      }
    }
  }
  ctx.putImageData(img,0,0);
  document.querySelector('.info').innerHTML=`🔍 拖拽移动 · 双指缩放<br>中心: ${centerX.toFixed(6)}, ${centerY.toFixed(6)}<br>缩放: ${scale.toFixed(0)}x`;
}

let dragging=false,dx0=0,dy0=0,lastPinch=0;
c.addEventListener('pointerdown',e=>{dragging=true;dx0=e.clientX;dy0=e.clientY});
c.addEventListener('pointermove',e=>{
  if(!dragging)return;
  if(e.isPrimary&&e.pointerType==='touch'&&e.getCoalescedEvents){
    const evts=e.getCoalescedEvents();
    for(const ev of evts){
      centerX-=(ev.clientX-dx0)/scale;centerY-=(ev.clientY-dy0)/scale;
      dx0=ev.clientX;dy0=ev.clientY;
    }
  }else{
    centerX-=(e.clientX-dx0)/scale;centerY-=(e.clientY-dy0)/scale;
    dx0=e.clientX;dy0=e.clientY;
  }
  render();
});
c.addEventListener('pointerup',()=>{dragging=false});
c.addEventListener('wheel',e=>{e.preventDefault();const mx=e.clientX,my=e.clientY;const zx=(mx-w/2)/scale+centerX,zy=(my-h/2)/scale+centerY;scale*=e.deltaY<0?1.3:.7;centerX=zx-(mx-w/2)/scale;centerY=zy-(my-h/2)/scale;render()},{passive:false});

let pinchStart=0,pinchScale=0,pinchCX=0,pinchCY=0;
c.addEventListener('touchstart',e=>{if(e.touches.length===2){pinchStart=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinchScale=scale;pinchCX=centerX;pinchCY=centerY}});
c.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const midX=(e.touches[0].clientX+e.touches[1].clientX)/2,midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    scale=pinchScale*(dist/pinchStart);
    const zx=(midX-w/2)/pinchScale+pinchCX,zy=(midY-h/2)/pinchScale+pinchCY;
    centerX=zx-(midX-w/2)/scale;centerY=zy-(midY-h/2)/scale;
    render();
  }
},{passive:false});

function resetView(){centerX=-.75;centerY=0;scale=200;iterMax=150;render()}
function cycleColors(){colorScheme=(colorScheme+1)%3;render()}
render();
</script>
</body>
</html>
