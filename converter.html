<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>单位换算</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0e1a;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e8f0;padding:20px}
.c{max-width:400px;width:100%}
.back{color:#6a7a95;text-decoration:none;font-size:13px;letter-spacing:1px;display:inline-block;margin-bottom:20px}
.back:hover{color:#a78bfa}
h1{font-size:20px;font-weight:300;letter-spacing:3px;color:#a78bfa;margin-bottom:16px;text-align:center}
.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);color:#6a7a95;padding:6px 12px;border-radius:10px;font-size:12px;cursor:pointer}
.tab.on{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.25);color:#a78bfa}
.row{display:flex;gap:8px;align-items:center;margin:8px 0}
.row input{flex:1;background:rgba(18,26,42,.8);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;color:#e0e8f0;font-size:16px;text-align:center;outline:none;width:0}
.row input:focus{border-color:rgba(167,139,250,.3)}
.row select{background:rgba(18,26,42,.8);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 6px;color:#c0c8d0;font-size:13px;outline:none;max-width:100px}
.equals{text-align:center;font-size:20px;color:#6a7a95;margin:4px 0}
</style>
</head>
<body>
<div class="c">
  <a class="back" href="tools.html">← 工具</a>
  <h1>📏 单位换算</h1>
  <div class="tabs" id="tabs"></div>
  <div class="row"><input type="number" id="v1" value="1" oninput="conv(1)"><select id="u1" onchange="conv(1)"></select></div>
  <div class="equals">=</div>
  <div class="row"><input type="number" id="v2" oninput="conv(2)"><select id="u2" onchange="conv(1)"></select></div>
</div>
<script>
const CATS={
  length:{name:'📏 长度',units:{m:1,km:1000,cm:.01,mm:.001,ft:.3048,in:.0254,mi:1609.34,yd:.9144}},
  weight:{name:'⚖️ 重量',units:{kg:1,g:.001,mg:.000001,t:1000,lb:.4536,oz:.02835}},
  temp:{name:'🌡️ 温度',units:{C:'C',F:'F',K:'K'},isTemp:true},
  area:{name:'📐 面积',units:{m2:1,km2:1000000,ha:10000,ft2:.0929,ac:4046.86}},
  speed:{name:'🚀 速度',units:{ms:1,kmh:.2778,mph:.447,kn:.5144}},
  data:{name:'💾 数据',units:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776}},
};
let cur='length';
function setUp(){
  document.getElementById('tabs').innerHTML=Object.entries(CATS).map(([k,v])=>`<span class="tab${k===cur?' on':''}" onclick="sel('${k}')">${v.name}</span>`).join('');
  const u1=document.getElementById('u1'),u2=document.getElementById('u2');
  const cat=CATS[cur];
  u1.innerHTML=u2.innerHTML=Object.keys(cat.units).map(u=>`<option>${u}</option>`).join('');
  u2.value=Object.keys(cat.units)[1]||'';
  conv(1);
}
function sel(c){cur=c;setUp()}
function conv(from){
  const cat=CATS[cur];
  if(cat.isTemp){
    const v1=parseFloat(document.getElementById('v1').value)||0;
    const u1=document.getElementById('u1').value,u2=document.getElementById('u2').value;
    let c;
    if(u1==='C')c=v1;else if(u1==='F')c=(v1-32)*5/9;else c=v1-273.15;
    let r;
    if(u2==='C')r=c;else if(u2==='F')r=c*9/5+32;else r=c+273.15;
    document.getElementById('v2').value=r.toFixed(2);
    return;
  }
  if(from===1){
    const v=parseFloat(document.getElementById('v1').value)||0;
    const u1=document.getElementById('u1').value,u2=document.getElementById('u2').value;
    const r=v*cat.units[u1]/cat.units[u2];
    document.getElementById('v2').value=r<.01?r.toExponential(4):r.toFixed(6);
  }else{
    const v=parseFloat(document.getElementById('v2').value)||0;
    const u1=document.getElementById('u1').value,u2=document.getElementById('u2').value;
    const r=v*cat.units[u2]/cat.units[u1];
    document.getElementById('v1').value=r<.01?r.toExponential(4):r.toFixed(6);
  }
}
setUp();
</script>
</body>
</html>
