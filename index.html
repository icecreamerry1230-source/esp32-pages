<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #e0e8f0; padding: 20px;
        }
        .container { text-align: center; max-width: 400px; width: 100%; }
        h1 {
            font-size: 28px; font-weight: 300; letter-spacing: 3px;
            background: linear-gradient(135deg, #7ec8ff, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .card {
            display: block;
            background: rgba(18,26,42,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 28px 24px; margin-bottom: 16px;
            text-decoration: none;
            transition: all 0.25s;
        }
        .card:hover { border-color: rgba(120,200,255,0.2); transform: translateY(-2px); }
        .card .icon { font-size: 40px; margin-bottom: 10px; }
        .card .name { font-size: 20px; font-weight: 600; color: #e0e8f0; margin-bottom: 6px; }
        .card .desc { font-size: 13px; color: #6a7a95; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 工具集</h1>
    <a class="card" href="sin.html">
        <div class="icon">📐</div>
        <div class="name">三角函数可视化</div>
        <div class="desc">单位圆 · 波形传递 · 动态相位</div>
    </a>
    <a class="card" href="2048.html">
        <div class="icon">🎮</div>
        <div class="name">2048</div>
        <div class="desc">经典数字游戏 · 滑动合并 · 挑战 2048</div>
    </a>
    <a class="card" href="snake.html">
        <div class="icon">🐍</div>
        <div class="name">贪吃蛇</div>
        <div class="desc">经典街机游戏 · 方向键滑动按钮 · 10级难度</div>
    </a>
    <a class="card" href="tetris.html">
        <div class="icon">🧱</div>
        <div class="name">俄罗斯方块</div>
        <div class="desc">经典消除游戏 · 旋转硬降 · 自动升级加速</div>
    </a>
    <a class="card" href="minesweeper.html">
        <div class="icon">💣</div>
        <div class="name">扫雷</div>
        <div class="desc">经典逻辑游戏 · 插旗推格子 · 三档难度</div>
    </a>
</div>
</body>
</html>
