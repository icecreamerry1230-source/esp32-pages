<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #e0e8f0; padding: 20px;
        }
        .container { text-align: center; max-width: 420px; width: 100%; }
        h1 {
            font-size: 28px; font-weight: 300; letter-spacing: 3px;
            background: linear-gradient(135deg, #7ec8ff, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 36px;
        }
        .card {
            display: block;
            background: rgba(18,26,42,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 28px 24px; margin-bottom: 14px;
            text-decoration: none;
            transition: all 0.25s;
        }
        .card:hover { border-color: rgba(120,200,255,0.2); transform: translateY(-2px); }
        .card .icon { font-size: 40px; margin-bottom: 10px; }
        .card .name { font-size: 20px; font-weight: 600; color: #e0e8f0; margin-bottom: 6px; }
        .card .desc { font-size: 13px; color: #6a7a95; }
        .card .count { font-size: 11px; color: #3a4a65; margin-top: 4px; }

        .card-games { border-color: rgba(120,200,255,0.15); }
        .card-games:hover { border-color: rgba(120,200,255,0.35); }
        .card-effects { border-color: rgba(251,191,36,0.15); }
        .card-effects:hover { border-color: rgba(251,191,36,0.35); }
        .card-tools { border-color: rgba(167,139,250,0.15); }
        .card-tools:hover { border-color: rgba(167,139,250,0.35); }
        .card-rank { border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.04); }
        .card-rank:hover { border-color: rgba(251,191,36,0.4); }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 工具集</h1>

    <a class="card card-games" href="games.html">
        <div class="icon">🎮</div>
        <div class="name">游戏</div>
        <div class="desc">经典小游戏合集 · 触屏优化</div>
        <div class="count">16 款游戏</div>
    </a>

    <a class="card card-effects" href="effects.html">
        <div class="icon">✨</div>
        <div class="name">特效</div>
        <div class="desc">视觉互动体验 · 触屏交互</div>
        <div class="count">2 个特效</div>
    </a>

    <a class="card card-tools" href="tools.html">
        <div class="icon">🔧</div>
        <div class="name">工具</div>
        <div class="desc">计算器 · 三角函数可视化</div>
        <div class="count">3 个工具</div>
    </a>

    <a class="card card-rank" href="ranking.html">
        <div class="icon">🏆</div>
        <div class="name">排行榜</div>
        <div class="desc">全游戏实时排名 · 跨设备同步</div>
        <div class="count">30 秒自动刷新</div>
    </a>
</div>
</body>
</html>
