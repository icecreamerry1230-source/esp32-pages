<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>矩阵雨</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none}canvas{display:block;position:fixed;inset:0}.label{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(74,222,128,.3);font-family:monospace;font-size:13px;letter-spacing:2px;z-index:1;pointer-events:none}.btn{position:fixed;top:16px;right:16px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:rgba(74,222,128,.7);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;z-index:2}.btn2{right:90px}</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">THE MATRIX</div>
<button class="btn" onclick="changeDensity()">密度</button>
<button class="btn btn2" onclick="changeSpeed()">速度</button>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let w,h,columns=[],fontSize=16,drops,speed=1.2,density=.975;
const chars='ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾝ1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ';
function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;drops=Math.floor(w/fontSize);columns=[];for(let i=0;i<drops;i++)columns[i]=Math.random()*h/fontSize}
resize();window.addEventListener('resize',resize);

function animate(){
  ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(0,0,w,h);
  ctx.font=fontSize+'px monospace';
  for(let i=0;i<columns.length;i++){
    const ch=chars[Math.floor(Math.random()*chars.length)];
    const x=i*fontSize,y=columns[i]*fontSize;
    ctx.fillStyle='rgba(74,222,128,.8)';ctx.fillText(ch,x,y);
    // 头部亮
    ctx.fillStyle='rgba(180,255,200,.95)';ctx.fillText(ch,x-1,y-1);
    if(y>h&&Math.random()>density)columns[i]=0;
    columns[i]+=speed*(.5+Math.random()*.5);
  }
  requestAnimationFrame(animate);
}
animate();

function changeDensity(){density=density>=.995?.9:density+.025;document.querySelector('.btn').textContent='密度:'+(Math.round((density)*100))+'%'}
function changeSpeed(){speed=speed>=3?.5:speed+.5;document.querySelector('.btn2').textContent='速度:'+speed.toFixed(1)+'x'}
</script>
</body>
</html>
