<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>开普勒轨道根数</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050a18;font-family:system-ui,sans-serif;display:flex;min-height:100vh;color:#e0e0e0;flex-direction:column;align-items:center;padding:16px}
.back{color:rgba(255,255,255,.4);text-decoration:none;font-size:12px;align-self:flex-start;margin-bottom:8px;letter-spacing:1px}.back:hover{color:#4a9eff}
h1{font-size:20px;font-weight:300;letter-spacing:2px;margin-bottom:4px}p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:8px}
canvas{border-radius:12px;border:1px solid rgba(255,255,255,.05)}
.ctrls{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;max-width:750px}
.ctrls label{font-size:10px;color:rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;gap:2px}
.ctrls input[type=range]{width:70px;accent-color:#4a9eff}
.ctrls .val{font-size:10px;color:#ffd700}
.info{font-size:12px;margin-top:8px;color:rgba(255,255,255,.5);text-align:center}
</style>
</head>
<body>
<a class="back" href="satellite-hub.html">← 合集</a>
<h1>📐 开普勒轨道六根数</h1>
<p>6个参数唯一确定卫星轨道。拖动滑块观察轨道变化</p>
<canvas id="c" width="750" height="480"></canvas>
<div class="info" id="info"></div>
<div class="ctrls">
  <label>半长轴 a<input type="range" min="50" max="180" value="120" id="sma" oninput="u()"><span class="val" id="smav">120</span></label>
  <label>偏心率 e<input type="range" min="0" max="70" value="10" id="ecc" oninput="u()"><span class="val" id="eccv">0.10</span></label>
  <label>倾角 i°<input type="range" min="0" max="90" value="55" id="inc" oninput="u()"><span class="val" id="incv">55°</span></label>
  <label>升交点Ω°<input type="range" min="0" max="360" value="0" id="raan" oninput="u()"><span class="val" id="raanv">0°</span></label>
  <label>近地点ω°<input type="range" min="0" max="360" value="0" id="aop" oninput="u()"><span class="val" id="aopv">0°</span></label>
  <label>真近点角ν°<input type="range" min="0" max="360" value="45" id="tan" oninput="u()"><span class="val" id="tanv">45°</span></label>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let params={a:120,e:0.1,i:55,raan:0,aop:0,tan:45};

function u(){
  params.a=parseInt(document.getElementById('sma').value);
  params.e=parseInt(document.getElementById('ecc').value)/100;
  params.i=parseInt(document.getElementById('inc').value);
  params.raan=parseInt(document.getElementById('raan').value);
  params.aop=parseInt(document.getElementById('aop').value);
  params.tan=parseInt(document.getElementById('tan').value);
  document.getElementById('smav').textContent=params.a;
  document.getElementById('eccv').textContent=params.e.toFixed(2);
  document.getElementById('incv').textContent=params.i+'°';
  document.getElementById('raanv').textContent=params.raan+'°';
  document.getElementById('aopv').textContent=params.aop+'°';
  document.getElementById('tanv').textContent=params.tan+'°';
  draw();
}

function orb2d(a,e,nu){
  const r=a*(1-e*e)/(1+e*Math.cos(nu*Math.PI/180));
  const x=r*Math.cos(nu*Math.PI/180),y=r*Math.sin(nu*Math.PI/180);
  return{x,y,r};
}

function draw(){
  ctx.clearRect(0,0,750,480);
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,750,480);

  const cx=280,cy=260;
  // 参考面（赤道面）
  ctx.strokeStyle='rgba(255,215,0,.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(cx,cy,200,60,0,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,215,0,.15)';ctx.font='10px system-ui';ctx.textAlign='center';
  ctx.fillText('赤道面参考',cx,cy-140);

  // 升交点线
  const raanR=params.raan*Math.PI/180;
  ctx.strokeStyle='rgba(0,255,136,.3)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+180*Math.cos(raanR),cy);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#00ff88';ctx.font='10px system-ui';ctx.fillText('Ω 升交点',cx+140,cy-8);

  // 轨道面（倾斜）
  const incR=params.i*Math.PI/180;
  const aopR=params.aop*Math.PI/180;

  // 绘制倾斜轨道椭圆
  ctx.save();ctx.translate(cx,cy);
  ctx.strokeStyle='#4a9eff';ctx.lineWidth=2;
  ctx.beginPath();
  const a=params.a,b=a*Math.sqrt(1-params.e*params.e);
  for(let t=0;t<360;t+=2){
    const tr=t*Math.PI/180;
    const r=a*(1-params.e*params.e)/(1+params.e*Math.cos(tr));
    const ox=r*Math.cos(tr),oy=r*Math.sin(tr);
    // 旋转近地点角
    const rx=ox*Math.cos(aopR)-oy*Math.sin(aopR);
    const ry=ox*Math.sin(aopR)+oy*Math.cos(aopR);
    // 倾斜投影
    const px=rx,py=ry*Math.cos(incR);
    if(t===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // 倾斜指示
  ctx.strokeStyle='rgba(74,158,255,.15)';ctx.lineWidth=1;ctx.setLineDash([2,6]);
  ctx.beginPath();ctx.ellipse(0,0,a,b*.8,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);

  // 卫星当前位置
  const sat=orb2d(a,params.e,params.tan);
  const sx=sat.x*Math.cos(aopR)-sat.y*Math.sin(aopR);
  const sy=(sat.x*Math.sin(aopR)+sat.y*Math.cos(aopR))*Math.cos(incR);
  ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('🛰️',sx,sy+4);

  // 地球
  ctx.fillStyle='#2255cc';ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='10px system-ui';ctx.fillText('🌍',0,4);

  ctx.restore();

  // 右侧：轨道参数说明
  const ix=580;
  ctx.fillStyle='#fff';ctx.font='14px system-ui';ctx.textAlign='left';
  ctx.fillText('六根数当前值',ix,40);
  const items=[
    ['a 半长轴',params.a+' (像素)','轨道大小'],
    ['e 偏心率',params.e.toFixed(2),'形状(0=圆)'],
    ['i 倾角',params.i+'°','轨道面与赤道面夹角'],
    ['Ω 升交点赤经',params.raan+'°','轨道与赤道交点方向'],
    ['ω 近地点角距',params.aop+'°','椭圆方向'],
    ['ν 真近点角',params.tan+'°','卫星在轨道上的位置'],
  ];
  items.forEach(([name,val,desc],i)=>{
    const y=70+i*38;
    ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(ix,y-6,150,32);
    ctx.fillStyle='#4a9eff';ctx.font='11px system-ui';ctx.fillText(name,ix+6,y+6);
    ctx.fillStyle='#ffd700';ctx.font='bold 12px system-ui';ctx.fillText(val,ix+6,y+21);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='9px system-ui';ctx.textAlign='right';ctx.fillText(desc,ix+145,y+21);
    ctx.textAlign='left';
  });

  document.getElementById('info').innerHTML='卫星距地心: <b>'+sat.r.toFixed(1)+'</b> px · 轨道周期约 <b>'+Math.floor(2*Math.PI*Math.sqrt(params.a*params.a*params.a/1))*10+'</b> 分钟';
}
u();
</script>
</body>
</html>
