<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>三球定位原理</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#050a18;font-family:system-ui,sans-serif;display:flex;min-height:100vh;color:#e0e0e0;flex-direction:column;align-items:center;padding:16px}
.back{color:rgba(255,255,255,.4);text-decoration:none;font-size:12px;align-self:flex-start;margin-bottom:8px;letter-spacing:1px}.back:hover{color:#4a9eff}
h1{font-size:20px;font-weight:300;letter-spacing:2px;margin-bottom:4px}
p{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px}
canvas{border-radius:12px;border:1px solid rgba(255,255,255,.05);cursor:pointer}
.info{font-size:13px;margin-top:8px;text-align:center}.info span{color:#ffd700;font-weight:600}
.ctrls{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.ctrls button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:10px;font-size:12px;cursor:pointer}.ctrls button:active{background:rgba(255,255,255,.1)}.ctrls button.on{background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.25);color:#4a9eff}</style>
</head>
<body>
<a class="back" href="satellite-hub.html">← 合集</a>
<h1>📍 三球定位原理</h1>
<p>GPS 通过测量到至少3颗卫星的距离 → 球面交会 → 唯一位置</p>
<canvas id="c" width="700" height="500"></canvas>
<div class="info">点击画布移动接收机位置&nbsp;|&nbsp;误差半径: <span id="err">0</span></div>
<div class="ctrls">
  <button onclick="addSat()">+ 加卫星</button><button onclick="delSat()">- 减卫星</button><button class="on" id="bt-show" onclick="toggle()">显示交会圆</button><button onclick="resetSats()">重置</button>
</div>
<script>
let target={x:350,y:250},satellites=[],showCircles=true;
function resetSats(){
  satellites=[{x:200,y:120,r:180},{x:480,y:100,r:200},{x:360,y:380,r:170}];
  draw();
}
function addSat(){satellites.push({x:100+Math.random()*500,y:80+Math.random()*340,r:120+Math.random()*150});draw()}
function delSat(){if(satellites.length>2)satellites.pop();draw()}
function toggle(){showCircles=!showCircles;document.getElementById('bt-show').classList.toggle('on',showCircles);draw()}

const c=document.getElementById('c'),ctx=c.getContext('2d');
function draw(){
  ctx.clearRect(0,0,700,500);
  ctx.fillStyle='#0a1020';ctx.fillRect(0,0,700,500);
  // 网格
  ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=.5;
  for(let i=0;i<700;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,500);ctx.stroke()}
  for(let i=0;i<500;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(700,i);ctx.stroke()}
  // 卫星和误差圆
  satellites.forEach((s,i)=>{
    // 信号圆
    if(showCircles){
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(74,158,255,'+(.15+i*.1)+')';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(74,158,255,'+(.04+i*.02)+')';ctx.fill();
    }
    // 卫星
    const grad=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,12);
    grad.addColorStop(0,'#fff');grad.addColorStop(.5,'#4a9eff');grad.addColorStop(1,'#1a4a80');
    ctx.beginPath();ctx.arc(s.x,s.y,11,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';
    ctx.fillText('🛰️',s.x,s.y+4);
    ctx.fillText('卫星'+(i+1)+' r='+Math.floor(s.r),s.x,s.y+22);
    // 连线到目标
    ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=1;ctx.setLineDash([2,6]);
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(target.x,target.y);ctx.stroke();ctx.setLineDash([]);
  });
  // 交会区域高亮
  if(showCircles&&satellites.length>=2){
    ctx.fillStyle='rgba(0,255,136,.15)';
    for(let px=0;px<700;px+=2)for(let py=0;py<500;py+=2){
      let inAll=true;
      for(const s of satellites){const dx=px-s.x,dy=py-s.y;if(dx*dx+dy*dy>s.r*s.r){inAll=false;break}}
      if(inAll)ctx.fillRect(px,py,2,2);
    }
  }
  // 目标点
  ctx.beginPath();ctx.arc(target.x,target.y,8,0,Math.PI*2);
  ctx.fillStyle='#ffd700';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='13px system-ui';ctx.textAlign='center';
  ctx.fillText('📍 定位点',target.x,target.y-16);
  // 计算误差
  if(satellites.length>=3){
    const err=Math.sqrt(satellites.reduce((s,sat)=>{const dx=target.x-sat.x,dy=target.y-sat.y;const d=Math.sqrt(dx*dx+dy*dy);return s+Math.abs(d-sat.r)},0)/satellites.length);
    document.getElementById('err').textContent=Math.floor(err);
  }
}
c.addEventListener('click',e=>{const r=c.getBoundingClientRect();target.x=e.clientX-r.left;target.y=e.clientY-r.top;draw()});
c.addEventListener('pointermove',e=>{if(e.buttons){const r=c.getBoundingClientRect();target.x=e.clientX-r.left;target.y=e.clientY-r.top;draw()}});
resetSats();
</script>
</body>
</html>
